# Classification configuration for AI-based issue/PR labeling.
#
# Each description is used as input to a sentence embedding model.
# The model computes cosine similarity between the issue text and each description.
# Better descriptions = better classification. Include keywords, synonyms, and
# phrases that typically appear in issues for that area.
#
# To tune accuracy:
#   - Edit descriptions to include terms from misclassified issues
#   - Adjust thresholds (lower = more labels assigned, higher = fewer but more precise)
#   - Run the test script to measure impact: python test_classify.py --repo OWNER/REPO

