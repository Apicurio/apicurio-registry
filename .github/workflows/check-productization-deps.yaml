name: Check Productization Dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"

jobs:
  check-deps:
    name: Detect unaligned dependencies
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: |
          mvn -B install -Pproductization -Pfull \
            -DskipTests -DskipITs \
            -Dcheckstyle.skip -Denforcer.skip \
            2>&1 | tee build.log || true

      - name: Parse unaligned dependencies
        id: parse
        run: |
          chmod +x .github/scripts/parse-unaligned-deps.sh
          BRANCH="${GITHUB_REF_NAME}"
          COUNT=$(.github/scripts/parse-unaligned-deps.sh build.log report.md "$BRANCH")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.parse.outputs.branch }}
          COUNT: ${{ steps.parse.outputs.count }}
        run: |
          TITLE="[Productization] Unaligned dependencies on ${BRANCH}"
          EXISTING=$(gh issue list --state open --search "in:title ${TITLE}" --json number --jq '.[0].number // empty')

          BODY=$(cat report.md)

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
            echo "Updated issue #${EXISTING}"
          else
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "productization"
            echo "Created new tracking issue"
          fi
