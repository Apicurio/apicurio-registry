name: Classify Issues

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.6'

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pip
          key: classify-pip-${{ hashFiles('.github/scripts/label-classification/classify.py') }}
          restore-keys: classify-pip-

      - name: Cache model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/huggingface
          key: classify-model-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install pyyaml sentence-transformers

      - name: Classify issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/label-classification/classify.py \
            --repo ${{ github.repository }} \
            --issue ${{ github.event.issue.number }}
