name: Classify Issues

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: classify-pip-${{ hashFiles('.github/scripts/label-classification/classify.py') }}
          restore-keys: classify-pip-

      - name: Cache model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/huggingface
          key: classify-model-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install pyyaml sentence-transformers

      - name: Classify issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/label-classification/classify.py \
            --repo ${{ github.repository }} \
            --issue ${{ github.event.issue.number }}
