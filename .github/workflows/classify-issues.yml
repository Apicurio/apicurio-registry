name: Classify Issues

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14.6'

      - name: Cache pip packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: classify-pip-${{ hashFiles('.github/scripts/label-classification/classify.py') }}
          restore-keys: classify-pip-

      - name: Cache model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/huggingface
          key: classify-model-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install pyyaml sentence-transformers

      - name: Classify issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/label-classification/classify.py \
            --repo ${{ github.repository }} \
            --issue ${{ github.event.issue.number }}
