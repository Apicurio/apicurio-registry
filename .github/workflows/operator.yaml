name: Operator Test Workflow
on:
  push:
    branches:
      - main
    paths:
      - operator/**
  pull_request:
    branches:
      - main
    paths:
      - operator/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_APP_IMAGE: ttl.sh/apicurio-registry-${{ github.sha }}:8h
  IMAGE: ttl.sh/apicurio-registry-3-operator-${{ github.sha }}:8h
  BUNDLE_IMAGE: ttl.sh/apicurio-registry-3-operator-bundle-${{ github.sha }}:8h
  CATALOG_IMAGE: ttl.sh/apicurio-registry-3-operator-catalog-${{ github.sha }}:8h

jobs:

  operator-build:
    name: Build Operator
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio' && !contains(github.event.*.labels.*.name, 'DO NOT MERGE')
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # We need to build the operand image as well as the operator, otherwise the tests would not reflect changes in the current PR.
      - name: Build
        run: mvn -B clean package -pl app,distro/docker,operator/olm-tests -am -Pprod -DskipTests -Dmaven.javadoc.skip

      # We need to push the operand image to ttl.sh so test matrix jobs on separate runners can pull it.
      - name: Build and push temporary operand image
        run: |
          docker build -f ./distro/docker/target/docker/Dockerfile.jvm -t "$REGISTRY_APP_IMAGE" ./distro/docker/target/docker
          docker push "$REGISTRY_APP_IMAGE"

      # We need to push the bundle image because opm always pulls; the catalog image because OLM
      # deploys it with `imagePullPolicy: Always`; and also the operator image itself for the same reason.
      - name: Build and push temporary operator image
        working-directory: operator
        run: |
          make image-build image-push

      - name: Build and push temporary operator bundle
        working-directory: operator
        run: |
          make bundle

      - name: Build and push temporary operator catalog
        working-directory: operator
        run: |
          make catalog

      - name: Generate install file for tests
        working-directory: operator
        run: |
          make INSTALL_FILE=controller/target/test-install.yaml dist-install-file

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operator-build-artifacts
          path: |
            operator/controller/target/
            operator/model/target/
            operator/olm-tests/target/
          retention-days: 1

  operator-test-local:
    name: Local Tests
    runs-on: ubuntu-latest
    needs: operator-build
    # Only run local tests on push to main
    if: github.event_name == 'push'
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: apicurio/apicurio-github-actions/setup-minikube@v2
        with:
          driver: 'none'
          ingress-enable: 'true'
          olm-enable: 'false'
          olm-v1-enable: 'false'

      - name: Build and run local tests on Minikube
        working-directory: operator
        run: |
          make BUILD_OPTS=--no-transfer-progress build

  operator-test:
    name: Remote Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: operator-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smoke
            groups: "smoke"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: kafka
            groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: auth
            groups: "auth"
            excluded-groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: database
            groups: "database"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature
            groups: "feature"
            excluded-groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature-setup
            groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: olm-v1
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "true"
            extra-build-opts: "-Dtest.operator.olm-version=1"
          - name: olm-v0
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "false"
            extra-build-opts: ""
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: operator-build-artifacts
          path: operator/

      - uses: apicurio/apicurio-github-actions/setup-minikube@v2
        with:
          driver: 'none'
          ingress-enable: 'true'
          olm-enable: ${{ matrix.olm-enable }}
          olm-v1-enable: ${{ matrix.olm-v1-enable }}
          start-args: '--alsologtostderr --v=2'

      - name: Run ${{ matrix.name }} tests on Minikube
        working-directory: operator
        run: |
          make BUILD_OPTS="--no-transfer-progress ${{ matrix.extra-build-opts }}" \
            REMOTE_TESTS_ALL_INSTALL_FILE=controller/target/test-install.yaml \
            GROUPS="${{ matrix.groups }}" \
            EXCLUDED_GROUPS="${{ matrix.excluded-groups }}" \
            test-remote-group

  operator-check-install:
    name: Check Install File
    runs-on: ubuntu-latest
    needs: operator-build
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build for install file generation
        run: mvn -B clean package -pl operator/controller -am -Pprod -DskipTests -Dmaven.javadoc.skip

      - name: Update install file
        working-directory: operator
        run: |
          # We need to unset the variables to generate a clean install file.
          # See https://github.com/actions/runner/issues/1126
          unset REGISTRY_APP_IMAGE
          unset IMAGE
          unset BUNDLE_IMAGE
          unset CATALOG_IMAGE
          make IMAGE_TAG=latest-snapshot INSTALL_FILE=install/install.yaml dist-install-file

      - name: Check install file
        run: |
          git add operator/install/install.yaml || true
          if ! git diff --staged --exit-code; then
            echo 'Install file needs to be updated. Please run "cd operator; make SKIP_TESTS=true build IMAGE_TAG=latest-snapshot INSTALL_FILE=install/install.yaml dist-install-file" and commit the result.';
            exit 1;
          else
            echo "No changes to the install file.";
          fi

  operator-publish:
    name: Publish Operator
    runs-on: ubuntu-latest
    needs: [operator-test, operator-check-install]
    if: github.event_name == 'push'
    steps:

      - name: Configure env. variables
        run: |
          # We want to use latest-snapshot instead of x.y.z-snapshot
          echo "IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV
          echo "BUNDLE_IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV
          echo "CATALOG_IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: operator
        run: |
          make BUILD_OPTS=--no-transfer-progress SKIP_TESTS=true build

      - name: Login to quay.io registry
        run: |
          docker login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      # TODO: Also push to DockerHub Registry
      - name: Build and publish operator image
        working-directory: operator
        run: |
          make image-build image-push

      - name: Build and publish operator bundle
        working-directory: operator
        run: |
          make bundle

      - name: Build and publish operator catalog
        working-directory: operator
        run: |
          make catalog

  # Slack notification using reusable workflow
  notify-slack:
    name: Slack Notification
    needs: operator-publish
    if: always() && github.event_name == 'push'
    uses: ./.github/workflows/reusable-notify-slack.yaml
    with:
      workflow-name: ${{ github.workflow }}
      job-name: 'operator-publish'
      job-status: ${{ needs.operator-publish.result }}
    secrets:
      SLACK_NOTIFICATION_WEBHOOK: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
      SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
