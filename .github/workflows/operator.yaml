name: Operator Test Workflow
on:
  workflow_call:
    inputs:
      publish:
        description: Whether to publish operator images (only on push to main)
        type: boolean
        default: false

permissions:
  contents: read

env:
  # Non-OLM test shards use workflow artifacts + minikube image load (no registry needed).
  # OLM shards still need ttl.sh because OLM itself pulls bundle/catalog images.
  REGISTRY_APP_IMAGE: localhost/apicurio-registry:${{ github.sha }}
  REGISTRY_GITOPS_SYNC_IMAGE: localhost/apicurio-registry-gitops-sync:${{ github.sha }}
  IMAGE: localhost/apicurio-registry-3-operator:${{ github.sha }}
  BUNDLE_IMAGE: ttl.sh/apicurio-registry-3-operator-bundle-${{ github.sha }}:8h
  CATALOG_IMAGE: ttl.sh/apicurio-registry-3-operator-catalog-${{ github.sha }}:8h

jobs:

  operator-build:
    name: Build Operator
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio' && !contains(github.event.*.labels.*.name, 'DO NOT MERGE')
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # We need to build the operand image as well as the operator, otherwise the tests would not reflect changes in the current PR.
      - name: Build
        run: ./mvnw -B clean package -Dfull -pl app,distro/docker,operator/olm-tests -am -Pprod -DskipTests -Dmaven.javadoc.skip

      - name: Build operand image
        run: |
          docker build -f ./distro/docker/target/docker/Dockerfile.jvm -t "$REGISTRY_APP_IMAGE" ./distro/docker/target/docker

      - name: Build GitOps sync sidecar image
        run: |
          docker build -t "$REGISTRY_GITOPS_SYNC_IMAGE" ./distro/gitops

      - name: Build operator image
        working-directory: operator
        run: |
          make image-build

      # OLM bundle and catalog must be pushed to a registry because OLM pulls them directly.
      # ttl.sh is kept only for these two images.
      - name: Build and push OLM bundle (ttl.sh)
        working-directory: operator
        run: |
          make ROLLING_CHANNEL=3.x bundle

      - name: Build and push OLM catalog (ttl.sh)
        working-directory: operator
        run: |
          make ROLLING_CHANNEL=3.x catalog

      - name: Generate install file for tests
        working-directory: operator
        run: |
          make INSTALL_FILE=controller/target/test-install.yaml dist-install-file

      # Save Docker images as artifacts so test shards can load them without a registry.
      # This replaces ttl.sh for the operand, operator, and gitops-sync images.
      - name: Save Docker images
        run: |
          docker save "$REGISTRY_APP_IMAGE" -o /tmp/operator-test-registry-app.tar
          docker save "$REGISTRY_GITOPS_SYNC_IMAGE" -o /tmp/operator-test-gitops-sync.tar
          docker save "$IMAGE" -o /tmp/operator-test-operator.tar

      - name: Upload Docker images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: operator-test-images
          path: /tmp/operator-test-*.tar
          retention-days: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: operator-build-artifacts
          path: |
            operator/controller/target/
            operator/model/target/
            operator/olm-tests/target/
          retention-days: 1

  operator-test-local:
    name: Local Tests
    runs-on: ubuntu-latest
    needs: operator-build
    # Only run local tests on push to main
    if: inputs.publish
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: apicurio/apicurio-github-actions/setup-minikube@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          driver: 'none'
          ingress-enable: 'true'
          olm-enable: 'false'
          olm-v1-enable: 'false'

      - name: Build and run local tests on Minikube
        working-directory: operator
        run: |
          make BUILD_OPTS=--no-transfer-progress build

  operator-test:
    name: Remote Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: operator-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smoke
            groups: "smoke"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: kafka
            groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: auth
            groups: "auth"
            excluded-groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: database
            groups: "database"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature
            groups: "feature"
            excluded-groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature-setup
            groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: olm-v1
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "true"
            extra-build-opts: "-Dtest.operator.olm-version=1"
          - name: olm-v0
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "false"
            extra-build-opts: ""
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: operator-build-artifacts
          path: operator/

      - name: Download Docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: operator-test-images
          path: /tmp/

      - uses: apicurio/apicurio-github-actions/setup-minikube@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          driver: 'none'
          ingress-enable: 'true'
          olm-enable: ${{ matrix.olm-enable }}
          olm-v1-enable: ${{ matrix.olm-v1-enable }}
          start-args: '--alsologtostderr --v=2'

      # Load pre-built images into the Docker daemon (shared with Minikube via driver: none).
      # This eliminates ttl.sh dependency for operand, operator, and gitops-sync images.
      - name: Load Docker images
        run: |
          docker load -i /tmp/operator-test-registry-app.tar
          docker load -i /tmp/operator-test-gitops-sync.tar
          docker load -i /tmp/operator-test-operator.tar

      - name: Run ${{ matrix.name }} tests on Minikube
        working-directory: operator
        run: |
          make BUILD_OPTS="--no-transfer-progress ${{ matrix.extra-build-opts }}" \
            REMOTE_TESTS_ALL_INSTALL_FILE=controller/target/test-install.yaml \
            GROUPS="${{ matrix.groups }}" \
            EXCLUDED_GROUPS="${{ matrix.excluded-groups }}" \
            test-remote-group

  operator-check-install:
    name: Check Install File
    runs-on: ubuntu-latest
    needs: operator-build
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build for install file generation
        run: ./mvnw -B clean package -Dfull -pl operator/controller -am -Pprod -DskipTests -Dmaven.javadoc.skip

      - name: Update install file
        working-directory: operator
        run: |
          # We need to unset the variables to generate a clean install file.
          # See https://github.com/actions/runner/issues/1126
          unset REGISTRY_APP_IMAGE
          unset REGISTRY_GITOPS_SYNC_IMAGE
          unset IMAGE
          unset BUNDLE_IMAGE
          unset CATALOG_IMAGE
          make IMAGE_TAG=latest-snapshot INSTALL_FILE=install/install.yaml dist-install-file

      - name: Check install file
        run: |
          git add operator/install/install.yaml || true
          if ! git diff --staged --exit-code; then
            echo 'Install file needs to be updated. Please run `pushd operator; make SKIP_TESTS=true build IMAGE_TAG=latest-snapshot INSTALL_FILE=install/install.yaml dist-install-file; popd` and commit the result.';
            exit 1;
          else
            echo "No changes to the install file.";
          fi

  operator-publish:
    name: Publish Operator
    runs-on: ubuntu-latest
    needs: [operator-test, operator-check-install]
    if: inputs.publish
    steps:

      - name: Configure env. variables
        run: |
          # We want to use latest-snapshot instead of x.y.z-snapshot
          echo "IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV
          echo "BUNDLE_IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV
          echo "CATALOG_IMAGE_TAG=latest-snapshot" >> $GITHUB_ENV

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: operator
        run: |
          make BUILD_OPTS=--no-transfer-progress SKIP_TESTS=true build

      - name: Login to quay.io registry
        run: |
          docker login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      # TODO: Also push to DockerHub Registry
      - name: Build and publish operator image
        working-directory: operator
        run: |
          make image-build image-push

      - name: Build and publish operator bundle
        working-directory: operator
        run: |
          make bundle

      - name: Build and publish operator catalog
        working-directory: operator
        run: |
          make catalog

  # Slack notification using reusable workflow
  notify-slack:
    name: Slack Notification
    needs: operator-publish
    if: always() && inputs.publish
    uses: ./.github/workflows/reusable-notify-slack.yaml
    with:
      workflow-name: ${{ github.workflow }}
      job-name: 'operator-publish'
      job-status: ${{ needs.operator-publish.result }}
    secrets:
      SLACK_NOTIFICATION_WEBHOOK: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
      SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
