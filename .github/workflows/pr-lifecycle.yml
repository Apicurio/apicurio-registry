name: PR Lifecycle

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
    branches: [main]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["Verify"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to reconcile
        required: true
        type: number
  schedule:
    - cron: '17 */6 * * *'

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-lifecycle-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # PR Opened / Reopened
  # ==========================================================================
  pr-opened:
    name: PR Opened
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' || github.event.action == 'reopened') &&
      !contains(github.event.pull_request.labels.*.name, 'orchestrator/disabled')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle PR opened
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handlePrOpened({ github, context, core });

  # ==========================================================================
  # PR Synchronize (new push)
  # ==========================================================================
  pr-synchronize:
    name: PR Push
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      !contains(github.event.pull_request.labels.*.name, 'orchestrator/disabled')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle push
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handlePrSynchronize({ github, context, core });

  # ==========================================================================
  # Draft -> Ready
  # ==========================================================================
  pr-ready-for-review:
    name: Draft to Ready
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'pull_request_target' &&
      github.event.action == 'ready_for_review' &&
      !contains(github.event.pull_request.labels.*.name, 'orchestrator/disabled')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle ready for review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handlePrReadyForReview({ github, context, core });

  # ==========================================================================
  # Comment Commands
  # ==========================================================================
  command:
    name: Command
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/') &&
      !contains(github.event.issue.labels.*.name, 'orchestrator/disabled')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle command
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleComment({ github, context, core });

  # ==========================================================================
  # Review Submitted
  # ==========================================================================
  review:
    name: Review
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'pull_request_review' &&
      (github.event.action == 'submitted' || github.event.action == 'dismissed') &&
      !contains(github.event.pull_request.labels.*.name, 'orchestrator/disabled')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleReview({ github, context, core });

  # ==========================================================================
  # Label Protection
  # ==========================================================================
  label-guard:
    name: Label Guard
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'labeled' || github.event.action == 'unlabeled') &&
      github.event.sender.login != 'github-actions[bot]' &&
      (startsWith(github.event.label.name, 'lifecycle/') || startsWith(github.event.label.name, 'orchestrator/'))
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle label change
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleLabelChange({ github, context, core });

  # ==========================================================================
  # Test Results (Verify workflow completed)
  # ==========================================================================
  test-result:
    name: Test Result
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'Apicurio' &&
      github.event_name == 'workflow_run'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Handle test result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleTestResult({ github, context, core });

  # ==========================================================================
  # Failure Notification
  # ==========================================================================
  failure-notify:
    name: Failure Notification
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'Apicurio' &&
      failure() &&
      github.event_name != 'schedule'
    needs: [pr-opened, pr-synchronize, pr-ready-for-review, command, review, label-guard, test-result, reconcile]
    steps:
      - name: Post warning comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { owner, repo } = context.repo;
            let prNumber = context.payload.pull_request?.number || context.payload.issue?.number;

            // For workflow_run events, resolve PR from the triggering run
            if (!prNumber && context.payload.workflow_run) {
              const run = context.payload.workflow_run;
              let prs = run.pull_requests || [];
              if (!prs.length) {
                const headOwner = run.head_repository?.owner?.login || owner;
                const { data: found } = await github.rest.pulls.list({
                  owner, repo, state: 'open',
                  head: `${headOwner}:${run.head_branch}`, per_page: 5,
                });
                prs = found.filter(p => p.head.sha === run.head_sha);
              }
              if (prs.length) prNumber = prs[0].number;
            }

            if (!prNumber) return;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: `**Warning:** The PR lifecycle orchestrator encountered an error while processing ` +
                `an event for this PR. Some labels or state transitions may be incorrect.\n\n` +
                `A maintainer or the PR author can use \`/retry\` to re-run the orchestrator.`
            });

  # ==========================================================================
  # Manual Reconciliation (workflow_dispatch)
  # ==========================================================================
  reconcile:
    name: Reconcile
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio' && github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Reconcile PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleReconcile({ github, context, core, prNumber: ${{ inputs.pr_number }} });

  # ==========================================================================
  # Stale Detection and Reconciliation (every 6 hours)
  # ==========================================================================
  stale:
    name: Stale Detection
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio' && github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Convert config to JSON
        run: yq -o json .github/pr-lifecycle.yml > .github/pr-lifecycle.json

      - name: Check for stale PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/pr-lifecycle.js');
            await handler.handleStale({ github, context, core });
