name: Release Images
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name'
        required: true
  release:
    types: [ released ]

permissions:
  contents: read

env:
  # The values are extracted from the github.event context,
  # which is only available when the workflow gets triggered by a release event.
  RELEASE_VERSION: ${{ github.event.release.name }}
  BRANCH: ${{ github.event.release.target_commitish }}


jobs:
  release-images:
    if: github.repository_owner == 'Apicurio' && (github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, '3.'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: View Disk Usage
        run: df -h

      # https://github.com/marketplace/actions/free-disk-space-ubuntu
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@76866dbe54312617f00798d1762df7f43def6e5c
        with:
          android: true
          dotnet: true
          haskell: true
          swap-storage: true
          large-packages: false
          # this might remove tools that are actually needed, but frees about 6 GB
          tool-cache: false

      - name: View Disk Usage
        run: df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Fetch Release Details
        if: github.event_name == 'workflow_dispatch'
        run: |
          touch release.json && curl https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${{ github.event.inputs.tag }} > release.json
          echo "RELEASE_VERSION=$(cat release.json | jq -r '.name')" >> $GITHUB_ENV
          echo "BRANCH=$(cat release.json | jq -r '.target_commitish')" >> $GITHUB_ENV

      - name: Determine if this is the latest release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const [releaseMajor, releaseMinor] = process.env.RELEASE_VERSION.split('.').map(Number);
            core.info(`Release version: ${process.env.RELEASE_VERSION} (major=${releaseMajor}, minor=${releaseMinor})`);

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const hasNewer = releases.some(r => {
              if (r.prerelease || r.draft) return false;
              const parts = r.tag_name.split('.').map(Number);
              if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return false;
              return parts[0] > releaseMajor || (parts[0] === releaseMajor && parts[1] > releaseMinor);
            });

            const isLatest = !hasNewer;
            core.info(`IS_LATEST_RELEASE=${isLatest}`);
            core.exportVariable('IS_LATEST_RELEASE', String(isLatest));

      - name: Calculate Minor Series Tag
        run: |
          MINOR_TAG=$(echo "$RELEASE_VERSION" | awk -F. '{print $1"."$2}')
          echo "MINOR_TAG=$MINOR_TAG" >> $GITHUB_ENV

      - name: Download Source Code
        run: git clone --branch $RELEASE_VERSION --single-branch ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git registry

      # We have faced issues in the past where a github release was created from a wrong commit
      # This step will ensure that the release was created from the right commit
      - name: Verify Project Version
        run: |
          cd registry
          PROJECT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ $PROJECT_VERSION != $RELEASE_VERSION ]]
          then
              echo "ERROR: Project Version '${PROJECT_VERSION}' does not match with Released Version '${RELEASE_VERSION}'"
              exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.18.0

      - name: Build Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For downloading Kiota binary.
        working-directory: registry
        run: |
          ./mvnw clean package -am --no-transfer-progress -Pprod -Dfull -DskipTests -DskipCommitIdPlugin=false -DcliSkipNative \
            -Daether.syncContext.named.factory=noop \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 -Dmaven.wagon.http.retryHandler.count=5

      - name: Build Registry UI
        working-directory: registry/ui
        run: |
          npm install
          npm run lint
          npm run build
          npm run package

      - name: Login to DockerHub Registry
        run: echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Login to Quay.io Registry
        run: docker login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build and push Apicurio Registry GitOps Sync image
        working-directory: registry
        run: |
          docker buildx build --push -f ./distro/gitops/Dockerfile \
              -t quay.io/apicurio/apicurio-registry-gitops-sync:$RELEASE_VERSION \
              -t quay.io/apicurio/apicurio-registry-gitops-sync:latest \
              --platform linux/amd64,linux/arm64,linux/s390x,linux/ppc64le ./distro/gitops

      - name: Build and push Apicurio Registry MCP Server image
        working-directory: registry/mcp
        run: |
          TAGS="-t quay.io/apicurio/apicurio-registry-mcp-server:$RELEASE_VERSION"
          TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-mcp-server:$MINOR_TAG"
          if [ "$IS_LATEST_RELEASE" = "true" ]; then
            TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-mcp-server:latest"
          fi
          docker buildx build --push -f ./target/docker/Dockerfile.jvm \
              $TAGS \
              --platform linux/amd64,linux/arm64,linux/s390x,linux/ppc64le ./target/docker

      - name: Build and Push Multi-arch Application Images
        run: |
          cd registry
          TAGS="-t docker.io/apicurio/apicurio-registry:$RELEASE_VERSION"
          TAGS="$TAGS -t docker.io/apicurio/apicurio-registry:$MINOR_TAG"
          TAGS="$TAGS -t quay.io/apicurio/apicurio-registry:$RELEASE_VERSION"
          TAGS="$TAGS -t quay.io/apicurio/apicurio-registry:$MINOR_TAG"
          if [ "$IS_LATEST_RELEASE" = "true" ]; then
            TAGS="$TAGS -t docker.io/apicurio/apicurio-registry:latest"
            TAGS="$TAGS -t docker.io/apicurio/apicurio-registry:latest-release"
            TAGS="$TAGS -t quay.io/apicurio/apicurio-registry:latest"
            TAGS="$TAGS -t quay.io/apicurio/apicurio-registry:latest-release"
          fi
          docker buildx build --push -f ./distro/docker/target/docker/Dockerfile.jvm \
              $TAGS \
              --platform linux/amd64,linux/arm64,linux/s390x,linux/ppc64le ./distro/docker/target/docker

      - name: Build and Push Multi-arch UI Images
        run: |
          cd registry/ui
          TAGS="-t docker.io/apicurio/apicurio-registry-ui:$RELEASE_VERSION"
          TAGS="$TAGS -t docker.io/apicurio/apicurio-registry-ui:$MINOR_TAG"
          TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-ui:$RELEASE_VERSION"
          TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-ui:$MINOR_TAG"
          if [ "$IS_LATEST_RELEASE" = "true" ]; then
            TAGS="$TAGS -t docker.io/apicurio/apicurio-registry-ui:latest"
            TAGS="$TAGS -t docker.io/apicurio/apicurio-registry-ui:latest-release"
            TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-ui:latest"
            TAGS="$TAGS -t quay.io/apicurio/apicurio-registry-ui:latest-release"
          fi
          docker buildx build --push -f ./Dockerfile \
              $TAGS \
              --platform linux/amd64,linux/arm64,linux/s390x,linux/ppc64le .

  # Slack notification using reusable workflow
  notify-slack:
    name: Slack Notification
    needs: release-images
    if: always()
    uses: ./.github/workflows/reusable-notify-slack.yaml
    with:
      workflow-name: ${{ github.workflow }}
      job-name: 'release-images'
      job-status: ${{ needs.release-images.result }}
    secrets:
      SLACK_NOTIFICATION_WEBHOOK: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
      SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
