name: Release Operator
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag name
        required: true
      run_tests:
        description: Run tests using the release artifacts
        type: boolean
        default: true

  release:
    types: [ released ]

permissions:
  contents: read

jobs:

  release-build:
    name: Build & Publish
    if: github.repository_owner == 'Apicurio' && (github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, '3.'))
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      release-version: ${{ steps.config.outputs.release-version }}
      branch: ${{ steps.config.outputs.branch }}
      run-tests: ${{ steps.config.outputs.run-tests }}
      package-version: ${{ steps.config.outputs.package-version }}
    steps:

      - name: Fetch Release Details
        if: github.event_name == 'workflow_dispatch'
        run: |
          touch release.json && curl "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/${{ github.event.inputs.tag }}" > release.json
          echo "RELEASE_VERSION=$(cat release.json | jq -r '.name')" >> $GITHUB_ENV
          echo "BRANCH=$(cat release.json | jq -r '.target_commitish')" >> $GITHUB_ENV
          echo "RUN_TESTS=${{ github.event.inputs.run_tests }}" >> $GITHUB_ENV

      - name: Configure release event env
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "RELEASE_VERSION=${{ github.event.release.name }}" >> $GITHUB_ENV
          echo "BRANCH=${{ github.event.release.target_commitish }}" >> $GITHUB_ENV
          echo "RUN_TESTS=true" >> $GITHUB_ENV

      - name: Download Source Code
        run: |
          git config --global user.name apicurio-ci
          git config --global user.email apicurio.ci@gmail.com
          git clone "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/apicurio-registry.git" registry
          cd registry && git checkout "$RELEASE_VERSION"
          # Resolve BRANCH if it's a commit SHA (happens when releasing from non-default branches)
          if [[ "$BRANCH" =~ ^[0-9a-f]{40}$ ]]; then
            # Prefer non-main branches to avoid resolving maintenance releases to main
            # (the SHA may exist on both after post-release sync)
            ALL_BRANCHES=$(git branch -r --contains "$BRANCH" | grep -v HEAD | sed 's|.*origin/||' | tr -d ' ')
            RESOLVED=$(echo "$ALL_BRANCHES" | grep -v '^main$' | head -1)
            if [ -z "$RESOLVED" ]; then
              RESOLVED=$(echo "$ALL_BRANCHES" | head -1)
            fi
            if [ -n "$RESOLVED" ]; then
              echo "Resolved branch SHA $BRANCH to $RESOLVED (candidates: $(echo $ALL_BRANCHES | tr '\n' ', '))"
              echo "BRANCH=$RESOLVED" >> $GITHUB_ENV
            else
              echo "ERROR: Could not resolve commit $BRANCH to a branch name"
              exit 1
            fi
          fi

      - name: Verify Project Version
        working-directory: registry
        run: |
          PROJECT_VERSION="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if [[ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]]
          then
              echo "ERROR: Project version $PROJECT_VERSION does not match released version $RELEASE_VERSION"
              exit 1
          fi

      - name: Configure outputs
        id: config
        working-directory: registry/operator
        run: |
          echo "release-version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "run-tests=$RUN_TESTS" >> $GITHUB_OUTPUT
          echo "package-version=$(make VAR=LC_VERSION variable-get)" >> $GITHUB_OUTPUT

      - name: Show make configuration
        working-directory: registry/operator
        run: |
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION config-show

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build the operator
        working-directory: registry/operator
        run: |
          make BUILD_OPTS=--no-transfer-progress SKIP_TESTS=true build

      - name: Login to Quay.io Registry
        run: docker login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build and push operator image
        working-directory: registry/operator
        run: |
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION ADDITIONAL_IMAGE_TAG=latest image-build image-push

      - name: Wait on operand images
        working-directory: registry/operator
        run: |
          export REGISTRY_APP_IMAGE="$(make OPERAND_IMAGE_TAG=$RELEASE_VERSION VAR=REGISTRY_APP_IMAGE variable-get)"
          until docker manifest inspect "$REGISTRY_APP_IMAGE" >& /dev/null; do echo "Waiting on $REGISTRY_APP_IMAGE"; sleep 10; done
          export REGISTRY_UI_IMAGE="$(make OPERAND_IMAGE_TAG=$RELEASE_VERSION VAR=REGISTRY_UI_IMAGE variable-get)"
          until docker manifest inspect "$REGISTRY_UI_IMAGE" >& /dev/null; do echo "Waiting on $REGISTRY_UI_IMAGE"; sleep 10; done
          export REGISTRY_GITOPS_SYNC_IMAGE="$(make VAR=REGISTRY_GITOPS_SYNC_IMAGE variable-get)"
          until docker manifest inspect "$REGISTRY_GITOPS_SYNC_IMAGE" >& /dev/null; do echo "Waiting on $REGISTRY_GITOPS_SYNC_IMAGE"; sleep 10; done

      - name: Build operator bundle
        working-directory: registry/operator
        run: |
          ROLLING_CHANNEL_ARG=""
          if [ "$BRANCH" = "main" ]; then
            ROLLING_CHANNEL_ARG="ROLLING_CHANNEL=3.x"
          fi
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION $ROLLING_CHANNEL_ARG bundle

      - name: Build operator catalog
        working-directory: registry/operator
        run: |
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION ADDITIONAL_CATALOG_IMAGE_TAG=latest catalog

      - name: Generate install file for tests
        working-directory: registry/operator
        run: |
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION INSTALL_FILE=controller/target/test-install.yaml dist-install-file

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: operator-test-artifacts
          path: |
            registry/operator/controller/target/
            registry/operator/model/target/
            registry/operator/olm-tests/target/
          retention-days: 1

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: operator-bundle-artifacts
          path: |
            registry/operator/target/bundle/
          retention-days: 1

  release-test:
    name: Test (${{ matrix.name }})
    needs: release-build
    if: needs.release-build.outputs.run-tests == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smoke
            groups: "smoke"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: kafka
            groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: auth
            groups: "auth"
            excluded-groups: "kafka"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: database
            groups: "database"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature
            groups: "feature"
            excluded-groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: feature-setup
            groups: "feature-setup"
            olm-enable: "false"
            olm-v1-enable: "false"
            extra-build-opts: ""
          - name: olm-v1
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "true"
            extra-build-opts: "-Dtest.operator.olm-version=1"
          - name: olm-v0
            groups: "OLM"
            olm-enable: "true"
            olm-v1-enable: "false"
            extra-build-opts: ""
    steps:

      - name: Download Source Code
        run: |
          git clone https://github.com/Apicurio/apicurio-registry.git registry
          cd registry && git checkout "${{ needs.release-build.outputs.release-version }}"

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: operator-test-artifacts
          path: registry/operator/

      - uses: apicurio/apicurio-github-actions/setup-minikube@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          driver: 'none'
          ingress-enable: 'true'
          olm-enable: ${{ matrix.olm-enable }}
          olm-v1-enable: ${{ matrix.olm-v1-enable }}
          start-args: '--alsologtostderr --v=2'

      - name: Run ${{ matrix.name }} tests on Minikube
        working-directory: registry/operator
        run: |
          make BUILD_OPTS="--no-transfer-progress ${{ matrix.extra-build-opts }}" \
            OPERAND_IMAGE_TAG="${{ needs.release-build.outputs.release-version }}" \
            REMOTE_TESTS_ALL_INSTALL_FILE=controller/target/test-install.yaml \
            GROUPS="${{ matrix.groups }}" \
            EXCLUDED_GROUPS="${{ matrix.excluded-groups }}" \
            test-remote-group

  release-post:
    name: Post-Release
    needs: [release-build, release-test]
    if: always() && needs.release-build.result == 'success' && (needs.release-test.result == 'success' || needs.release-test.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RELEASE_VERSION: ${{ needs.release-build.outputs.release-version }}
      BRANCH: ${{ needs.release-build.outputs.branch }}
      PACKAGE_VERSION: ${{ needs.release-build.outputs.package-version }}
    steps:

      - name: Configure env. variables
        run: |
          echo "GH_TOKEN=${{ secrets.ACCESS_TOKEN }}" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH=release-$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Download Source Code
        run: |
          git config --global user.name apicurio-ci
          git config --global user.email apicurio.ci@gmail.com
          git clone "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/apicurio-registry.git" registry
          cd registry && git checkout "$RELEASE_VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build operator
        working-directory: registry/operator
        run: |
          make BUILD_OPTS=--no-transfer-progress SKIP_TESTS=true OPERAND_IMAGE_TAG=$RELEASE_VERSION build

      - name: Download bundle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: operator-bundle-artifacts
          path: registry/operator/target/bundle/

      - name: Build dist archive and attach to the release
        working-directory: registry/operator
        run: |
          make OPERAND_IMAGE_TAG=$RELEASE_VERSION dist
          DIST_FILE="target/apicurio-registry-operator-$RELEASE_VERSION.tar.gz"
          gh release upload "$RELEASE_VERSION" "$DIST_FILE"

      - name: Checkout the Community Operators repository
        run: |
          mkdir community-operators
          cd community-operators
          git init
          git remote add origin https://github.com/k8s-operatorhub/community-operators.git
          git remote add source "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/community-operators.git"
          git fetch
          git checkout --track origin/main
          git push -f source main

      - name: Create the Community Operators PR
        id: community-operators-pr
        continue-on-error: true
        working-directory: community-operators
        run: |
          git checkout -b "$RELEASE_BRANCH"
          TITLE="Release Apicurio Registry Operator $PACKAGE_VERSION"
          BODY="$(curl -s https://raw.githubusercontent.com/k8s-operatorhub/community-operators/main/docs/pull_request_template.md)"
          cp -r "../registry/operator/target/bundle/apicurio-registry-3/$PACKAGE_VERSION" operators/apicurio-registry-3
          git add .
          git commit -s -m "$TITLE"
          git push -f source "$RELEASE_BRANCH"
          gh repo set-default k8s-operatorhub/community-operators
          gh pr create --title "$TITLE" --body "$BODY" --base main --head "Apicurio:$RELEASE_BRANCH"

      - name: Warn if Community Operators PR failed
        if: steps.community-operators-pr.outcome == 'failure'
        run: echo "::warning::Failed to create Community Operators PR. Please create it manually."

      - name: Checkout the Openshift Community Operators repository
        run: |
          mkdir openshift-community-operators
          cd openshift-community-operators
          git init
          git remote add origin https://github.com/redhat-openshift-ecosystem/community-operators-prod.git
          git remote add source "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/community-operators-prod.git"
          git fetch
          git checkout --track origin/main
          git push -f source main

      - name: Create the Openshift Community Operators PR
        id: openshift-community-operators-pr
        continue-on-error: true
        working-directory: openshift-community-operators
        run: |
          git checkout -b "$RELEASE_BRANCH"
          TITLE="Release Apicurio Registry Operator $PACKAGE_VERSION"
          BODY="$(curl -s https://raw.githubusercontent.com/redhat-openshift-ecosystem/community-operators-prod/main/docs/pull_request_template.md)"

          # Copy the bundle directory
          cp -r "../registry/operator/target/bundle/apicurio-registry-3/$PACKAGE_VERSION" operators/apicurio-registry-3

          # Update FBC catalog templates if FBC is enabled
          PKG_NAME="apicurio-registry-3"
          FBC_ENABLED=$(cd "operators/$PKG_NAME" && cat ci.yaml | grep -c "fbc:" || true)
          if [ "$FBC_ENABLED" -gt 0 ]; then
            echo "FBC is enabled — updating catalog templates"
            MINOR_CHANNEL=$(echo "$PACKAGE_VERSION" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
            CSV_NAME="$PKG_NAME.v$PACKAGE_VERSION"
            BUNDLE_IMG="quay.io/apicurio/apicurio-registry-3-operator-bundle:$PACKAGE_VERSION"

            # Determine which channels to update
            if [ "$BRANCH" = "main" ]; then
              CHANNELS="3.x $MINOR_CHANNEL"
            else
              CHANNELS="$MINOR_CHANNEL"
            fi

            cd "operators/$PKG_NAME"

            # Download yq if not present
            if [ ! -f ../../bin/yq ]; then
              mkdir -p ../../bin
              curl -sLo ../../bin/yq "https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64"
              chmod +x ../../bin/yq
            fi
            YQ="../../bin/yq"

            # Find the current head of each channel to set as 'replaces'
            SAMPLE_TPL=$(ls catalog-templates/v4.16.yaml 2>/dev/null || ls catalog-templates/v4.*.yaml | head -1)

            for tpl in catalog-templates/v4.*.yaml; do
              echo "  Updating $tpl"
              for CH in $CHANNELS; do
                # Check if channel exists in the template
                CH_EXISTS=$($YQ ".entries[] | select(.schema == \"olm.channel\") | select(.name == \"$CH\") | .name" "$tpl" 2>/dev/null || true)
                CH_HEAD=$($YQ ".entries[] | select(.schema == \"olm.channel\") | select(.name == \"$CH\") | .entries[0].name" "$tpl" 2>/dev/null || true)

                if [ -z "$CH_EXISTS" ] || [ "$CH_EXISTS" = "null" ]; then
                  # Channel doesn't exist — create it (new minor release)
                  echo "    Creating new channel $CH"
                  $YQ -i ".entries |= . + [{\"schema\": \"olm.channel\", \"package\": \"$PKG_NAME\", \"name\": \"$CH\", \"entries\": [{\"name\": \"$CSV_NAME\"}]}]" "$tpl"
                elif [ -n "$CH_HEAD" ] && [ "$CH_HEAD" != "null" ]; then
                  # Channel exists with entries — prepend new version
                  $YQ -i "(.entries[] | select(.schema == \"olm.channel\") | select(.name == \"$CH\") | .entries) |= [{\"name\": \"$CSV_NAME\", \"replaces\": \"$CH_HEAD\"}] + ." "$tpl"
                else
                  # Channel exists but empty — add first entry
                  $YQ -i "(.entries[] | select(.schema == \"olm.channel\") | select(.name == \"$CH\") | .entries) |= [{\"name\": \"$CSV_NAME\"}]" "$tpl"
                fi
              done
              # Add bundle image reference
              $YQ -i ".entries |= . + [{\"schema\": \"olm.bundle\", \"image\": \"$BUNDLE_IMG\"}]" "$tpl"
            done

            # Regenerate and validate catalogs
            make catalogs
            make validate-catalogs
            echo "FBC catalog update complete"
            cd ../..
          else
            echo "FBC is not enabled — submitting bundle only"
          fi

          git add .
          git commit -s -m "$TITLE"
          git push -f source "$RELEASE_BRANCH"
          gh repo set-default redhat-openshift-ecosystem/community-operators-prod
          gh pr create --title "$TITLE" --body "$BODY" --base main --head "Apicurio:$RELEASE_BRANCH"

      - name: Warn if Openshift Community Operators PR failed
        if: steps.openshift-community-operators-pr.outcome == 'failure'
        run: echo "::warning::Failed to create Openshift Community Operators PR. Please create it manually."

      - name: Prepare post-release changes
        working-directory: registry/operator
        run: |
          # Switch to the branch and pull latest to pick up the snapshot version update by release.yaml .
          # It could have been pushed after the initial clone.
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"

      - name: Update Makefile
        working-directory: registry/operator
        run: |
          OLD_PREV=$(make VAR=PREVIOUS_PACKAGE_VERSION variable-get)
          OLD_CHANNEL=$(echo "$OLD_PREV" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
          NEW_CHANNEL=$(echo "$PACKAGE_VERSION" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
          if [ "$OLD_CHANNEL" != "$NEW_CHANNEL" ]; then
            echo "OLD_PREVIOUS_CHANNEL=$OLD_CHANNEL" >> $GITHUB_ENV
          fi
          make VAR=PREVIOUS_PACKAGE_VERSION "VAL=$PACKAGE_VERSION" variable-set
          git add Makefile

      - name: Update catalog template
        working-directory: registry/operator
        run: |
          CATALOG_ARGS=""
          if [ -n "${OLD_PREVIOUS_CHANNEL:-}" ]; then
            CATALOG_ARGS="OLD_PREVIOUS_CHANNEL=$OLD_PREVIOUS_CHANNEL"
          fi
          make $CATALOG_ARGS release-catalog-template-update
          git add "$(make VAR=CATALOG_DIR variable-get)"

      - name: Update install file
        working-directory: registry/operator
        run: |
          make IMAGE_TAG=latest-snapshot OPERAND_IMAGE_TAG=latest-snapshot SKIP_TESTS=true build INSTALL_FILE=install/install.yaml dist-install-file
          git add install/*

      - name: Commit & push post-release changes
        working-directory: registry/operator
        run: |
          git commit -m "ci(operator): post-release changes for $RELEASE_VERSION"
          # Rebase in case somebody else pushed to the branch
          git fetch origin
          git rebase "origin/$BRANCH"
          git push origin "$BRANCH"

      - name: Sync post-release changes to main
        if: env.BRANCH != 'main'
        working-directory: registry
        run: |
          # Save the versioned install file before switching branches
          INSTALL_FILE="operator/install/apicurio-registry-operator-$RELEASE_VERSION.yaml"
          cp "$INSTALL_FILE" /tmp/install-file.yaml

          # Switch to main
          git checkout main
          git pull origin main

          # Copy the versioned install file
          cp /tmp/install-file.yaml "$INSTALL_FILE"

          RELEASE_CHANNEL=$(echo "$PACKAGE_VERSION" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
          MAIN_CHANNEL=$(cd operator && make VAR=CHANNEL variable-get)

          cd operator
          if [ "$RELEASE_CHANNEL" = "$MAIN_CHANNEL" ]; then
            # Same minor as main — full catalog update
            OLD_PREV=$(make VAR=PREVIOUS_PACKAGE_VERSION variable-get)
            OLD_CH=$(echo "$OLD_PREV" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
            NEW_CH=$(echo "$PACKAGE_VERSION" | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.x/')
            CATALOG_ARGS=""
            if [ "$OLD_CH" != "$NEW_CH" ]; then
              CATALOG_ARGS="OLD_PREVIOUS_CHANNEL=$OLD_CH"
            fi
            make VAR=PREVIOUS_PACKAGE_VERSION "VAL=$PACKAGE_VERSION" variable-set
            make $CATALOG_ARGS release-catalog-template-update
          else
            # Maintenance release from an older minor — only update its channel
            # and add the bundle image. Do NOT touch PREVIOUS_PACKAGE_VERSION,
            # the rolling channel, or other minor channels on main.
            CATALOG_DIR=$(make VAR=CATALOG_DIR variable-get)
            CATALOG_FILE="$CATALOG_DIR/catalog.template.yaml"
            PKG_NAME=$(make VAR=PACKAGE_NAME variable-get)
            LC_VERSION=$(echo "$PACKAGE_VERSION" | tr A-Z a-z)
            PREV_PKG=$(make VAR=PREVIOUS_PACKAGE variable-get)
            BUNDLE_IMG="$(make VAR=IMAGE_REGISTRY variable-get)/$(make VAR=BUNDLE_IMAGE_NAME variable-get):$LC_VERSION"
            YQ=$(make VAR=YQ variable-get)

            echo "Syncing maintenance release $PACKAGE_VERSION to main (channel $RELEASE_CHANNEL only)"

            # Add the new version to its minor channel
            $YQ -i "(.entries[] | select(.schema == \"olm.channel\") | select(.name == \"$RELEASE_CHANNEL\") | .entries) |= [{\"name\": \"$PKG_NAME.v$PACKAGE_VERSION\", \"replaces\": \"$PREV_PKG\"}] + ." "$CATALOG_FILE"

            # Add the bundle image
            $YQ -i ".entries |= . + [{\"schema\": \"olm.bundle\", \"image\": \"$BUNDLE_IMG\"}]" "$CATALOG_FILE"
          fi

          cd ..
          git add .
          git commit -m "ci(operator): sync $RELEASE_VERSION post-release changes from $BRANCH to main"
          git rebase origin/main
          git push origin main

      - name: Slack Notification (Always)
        if: always()
        run: |
          MESSAGE="'${{ github.workflow }}/${{ github.job }}' job completed with status: ${{ job.status }}"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}"

      - name: Slack Notification (Error)
        if: failure()
        run: |
          MESSAGE="'${{ github.workflow }}/${{ github.job }}' job FAILED!"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.SLACK_ERROR_WEBHOOK }}"

      - name: Setup tmate session on failure
        if: failure()
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        with:
          limit-access-to-actor: true
