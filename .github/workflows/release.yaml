name: Release Workflow
on:
  workflow_dispatch:
    inputs:
      release-version:
        description: Version being released
        required: true
      branch:
        description: Branch to release from
        required: true
        default: main
      no-more-minor-releases:
        type: boolean
        description: "I understand that releasing from main prevents further patch releases from older minor branches (e.g., 3.2.x)"
        default: false
      notice:
        type: boolean
        description: I will notify jsenko if the operator release workflow fails!

jobs:
  # Phase 1: Bump version, commit, push. Fast job that gates all parallel builds.
  release-prepare:
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'Apicurio'
    outputs:
      release-sha: ${{ steps.release-commit.outputs.sha }}
    steps:

      - name: Check
        run: |
          if [ "${{ inputs.notice }}" != "true" ]; then
            echo "Error: You must check the notice checkbox to proceed with the release!"
            exit 1
          fi

      - name: Calculate Versions
        run: |
          RELEASE_VERSION="${{ github.event.inputs.release-version }}"
          MAJOR=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $1}')
          MINOR=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $2}')
          PATCH=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $3}')

          echo "RELEASE_DOCS_VERSION=${MAJOR}.${MINOR}.x" >> $GITHUB_ENV
          echo "RELEASE_UI_VERSION=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Log Metadata
        run: |
          echo "Releasing Apicurio Registry version ${{ github.event.inputs.release-version }} from branch ${{ github.event.inputs.branch }}"

      # JDK is only needed here for mvn versions:set
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up json CLI
        run: npm install -g json

      - name: Apicurio Registry Checkout
        run: |
          mkdir registry
          cd registry
          git init
          git config --global user.name "apicurio-ci"
          git config --global user.email "apicurio.ci@gmail.com"
          git remote add origin "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/apicurio-registry.git"
          git fetch
          git checkout ${{ github.event.inputs.branch }}
          git branch --set-upstream-to=origin/${{ github.event.inputs.branch }}
          git pull

      - name: Verify OLM channel linearity
        working-directory: registry
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          OUR_PREV_VERSION=$(cd operator && make VAR=PREVIOUS_PACKAGE_VERSION variable-get)

          if [ "$BRANCH" = "main" ]; then
            # Releasing from main cuts off minor branch releases. Require acknowledgement.
            if [ "${{ github.event.inputs.no-more-minor-releases }}" != "true" ]; then
              echo "ERROR: Releasing from main prevents further patch releases from older minor branches."
              echo "Check the 'no-more-minor-releases' parameter to acknowledge this and retry."
              exit 1
            fi
          else
            # Releasing from a minor branch — verify main hasn't released ahead.
            # If main's PREVIOUS_PACKAGE_VERSION differs from ours, main already
            # released a newer version and the OLM chain would fork.
            MAIN_PREV_VERSION=$(git show origin/main:operator/Makefile | grep '^PREVIOUS_PACKAGE_VERSION' | sed 's/.*?=\s*//' | tr -d ' ')
            echo "Branch PREVIOUS_PACKAGE_VERSION: $OUR_PREV_VERSION"
            echo "Main PREVIOUS_PACKAGE_VERSION:   $MAIN_PREV_VERSION"
            if [ "$OUR_PREV_VERSION" != "$MAIN_PREV_VERSION" ]; then
              echo "ERROR: OLM channel linearity violation!"
              echo "Main has PREVIOUS_PACKAGE_VERSION=$MAIN_PREV_VERSION but this branch has $OUR_PREV_VERSION."
              echo "A release from main (or another branch) has already advanced the OLM channel."
              echo "No more patch releases can be made from this branch."
              exit 1
            fi
          fi

      - name: Update Release Version ${{ github.event.inputs.release-version}}
        run: |
          cd registry
          mvn versions:set -DnewVersion=${{ github.event.inputs.release-version}} -DgenerateBackupPoms=false -DprocessAllModules=true

          sed -i  "s/version\:\s.*/version: \'${{ env.RELEASE_DOCS_VERSION }}\'/g" docs/antora.yml
          sed -i  "5s/\"version\"\:\s\".*\"/\"version\": \"${{ env.RELEASE_DOCS_VERSION }}\"/g" app/src/main/resources-unfiltered/META-INF/resources/api-specifications/registry/v3/openapi.json

          # TODO: Operator docs

          sed -i "s/^version.*/version \= \"${{ env.RELEASE_UI_VERSION }}\"/" python-sdk/pyproject.toml

          pushd ui
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

          pushd ui/ui-app
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          json -I -f package.json -e "this.dependencies[\"@apicurio/apicurio-registry-sdk\"]=\"${{ env.RELEASE_UI_VERSION }}\""
          popd

          pushd ui/ui-docs
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

          pushd ui/ui-editors
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

          pushd ui/tests
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

          pushd typescript-sdk
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

          pushd artifact-type-builtins
          npm version ${{ env.RELEASE_UI_VERSION }} --allow-same-version
          popd

      - name: (Operator) Configure env. variables
        run: |
          echo "OPERAND_IMAGE_TAG=${{ github.event.inputs.release-version }}" >> $GITHUB_ENV

      - name: (Operator) Generate CRD
        working-directory: registry
        run: |
          mvn -pl operator/controller -am -Pfull install -DskipTests --no-transfer-progress

      - name: (Operator) Update install file
        working-directory: registry/operator
        run: |
          make dist-install-file
          cp "$(make VAR=INSTALL_FILE variable-get)" install/install.yaml
          git add install/*

      - name: (Operator) Commit pre-release changes
        working-directory: registry/operator
        run: |
          git commit -m "ci(operator): pre-release changes for ${{ github.event.inputs.release-version }}"

      - name: Commit Release Version Change
        id: release-commit
        run: |
          cd registry
          git add .
          git commit -m "Automated update to Release Version:: ${{ github.event.inputs.release-version}}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Slack Notification (Error)
        if: failure()
        run: |
          MESSAGE="'${{ github.workflow }}/release-prepare' job FAILED!"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_ERROR_WEBHOOK }}

  # Phase 2a: Build the registry app (Maven).
  # Runs in parallel with UI and CLI builds.
  release-build-app:
    name: Build Registry App
    needs: release-prepare
    if: github.repository_owner == 'Apicurio'
    runs-on: ubuntu-22.04
    steps:
      - name: Apicurio Registry Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-prepare.outputs.release-sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw clean package \
            --no-transfer-progress \
            -Pprod -Dfull -pl '!cli' \
            -DskipTests \
            -DskipCommitIdPlugin=false \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 \
            -Dmaven.wagon.http.retryHandler.count=5

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            distro/docker/target/docker/app-files/apicurio-registry-app-${{ github.event.inputs.release-version }}-all.*
          retention-days: 1
          if-no-files-found: error

  # Phase 2b: Build the registry UI (npm).
  # Runs in parallel with app and CLI builds.
  # This is a validation gate only — the UI is rebuilt independently
  # by the release-images workflow for Docker image creation.
  release-build-ui:
    name: Build Registry UI
    needs: release-prepare
    if: github.repository_owner == 'Apicurio'
    runs-on: ubuntu-22.04
    steps:
      - name: Apicurio Registry Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-prepare.outputs.release-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Registry UI
        working-directory: ui
        run: |
          npm install
          npm run lint
          npm run build
          npm run package

  # Phase 2c: Build CLI native binaries for each platform.
  # Runs in parallel with app and UI builds.
  release-build-cli:
    name: Build CLI (${{ matrix.os-name }})
    needs: release-prepare
    if: github.repository_owner == 'Apicurio'
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-22.04
            os-name: linux-x86_64
          - runner: macos-14
            os-name: osx-aarch_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Apicurio Registry Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-prepare.outputs.release-sha }}

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '23'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build CLI Native Binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw clean package \
            --no-transfer-progress \
            -pl cli -am \
            -DskipTests \
            -Dquarkus.native.container-build=false \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 \
            -Dmaven.wagon.http.retryHandler.count=5

      - name: Upload CLI ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os-name }}
          path: cli/target/apicurio-registry-cli-${{ github.event.inputs.release-version }}-*.zip
          retention-days: 1
          if-no-files-found: error

  # Phase 3: Create GitHub Release and bump to next snapshot.
  # Only runs after all builds succeed — if any build fails, no release is created.
  release-publish:
    name: Publish Release
    needs: [release-prepare, release-build-app, release-build-ui, release-build-cli]
    if: github.repository_owner == 'Apicurio'
    runs-on: ubuntu-22.04
    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Download CLI ZIPs
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-zips/
          merge-multiple: true

      - name: Verify Release Artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -la artifacts/
          echo "=== CLI ZIPs ==="
          ls -la cli-zips/
          for classifier in linux-x86_64 osx-aarch_64; do
            if ! ls cli-zips/*-${classifier}.zip 1>/dev/null 2>&1; then
              echo "ERROR: Missing CLI ZIP for ${classifier}"
              exit 1
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.release-version }}
          tag_name: ${{ github.event.inputs.release-version }}
          token: ${{ secrets.ACCESS_TOKEN }}
          target_commitish: ${{ needs.release-prepare.outputs.release-sha }}
          files: |
            artifacts/*
            cli-zips/*

      - name: Calculate Next Version
        run: |
          RELEASE_VERSION="${{ github.event.inputs.release-version }}"
          MAJOR=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $1}')
          MINOR=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $2}')
          PATCH=$(echo "$RELEASE_VERSION" | awk -F '[.-]' '{print $3}')
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "SNAPSHOT_VERSION=${NEXT_VERSION}-SNAPSHOT" >> $GITHUB_ENV
          echo "SNAPSHOT_DOCS_VERSION=${MAJOR}.${MINOR}.x" >> $GITHUB_ENV
          echo "SNAPSHOT_UI_VERSION=${MAJOR}.${MINOR}.${NEXT_PATCH}-Dev" >> $GITHUB_ENV
          echo "NEXT_VERSION=${NEXT_VERSION}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up json CLI
        run: npm install -g json

      - name: Apicurio Registry Checkout
        run: |
          mkdir registry
          cd registry
          git init
          git config --global user.name "apicurio-ci"
          git config --global user.email "apicurio.ci@gmail.com"
          git remote add origin "https://apicurio-ci:${{ secrets.ACCESS_TOKEN }}@github.com/Apicurio/apicurio-registry.git"
          git fetch
          git checkout ${{ github.event.inputs.branch }}
          git branch --set-upstream-to=origin/${{ github.event.inputs.branch }}
          git pull

      - name: Update Snapshot Version ${{ env.SNAPSHOT_VERSION }}
        run: |
          cd registry
          mvn versions:set -DnewVersion=${{ env.SNAPSHOT_VERSION }} -DgenerateBackupPoms=false -DprocessAllModules=true

          sed -i  "s/version\:\s.*/version: \'${{ env.SNAPSHOT_DOCS_VERSION }}\'/g" docs/antora.yml
          sed -i  "5s/\"version\"\:\s\".*\"/\"version\": \"${{ env.SNAPSHOT_DOCS_VERSION }}\"/g" app/src/main/resources-unfiltered/META-INF/resources/api-specifications/registry/v3/openapi.json

          # TODO: Operator docs

          sed -i "s/^version.*/version \= \"${{ env.NEXT_VERSION }}\"/" python-sdk/pyproject.toml

          pushd ui
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

          pushd ui/ui-app
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          json -I -f package.json -e "this.dependencies[\"@apicurio/apicurio-registry-sdk\"]=\"${{ env.SNAPSHOT_UI_VERSION }}\""
          popd

          pushd ui/ui-docs
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

          pushd ui/ui-editors
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

          pushd ui/tests
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

          pushd typescript-sdk
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

          pushd artifact-type-builtins
          npm version ${{ env.SNAPSHOT_UI_VERSION }} --allow-same-version
          popd

      - name: Commit Snapshot Version ${{ env.SNAPSHOT_VERSION }}
        run: |
          cd registry
          git add .
          git commit -m "Automated update to next Snapshot Version: ${{ env.SNAPSHOT_VERSION }}"
          git push

      - name: Slack Notification (Always)
        if: always()
        run: |
          MESSAGE="'${{ github.workflow }}' completed with status: ${{ job.status }}"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}

      - name: Slack Notification (Error)
        if: failure()
        run: |
          MESSAGE="'${{ github.workflow }}' FAILED!"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_ERROR_WEBHOOK }}
