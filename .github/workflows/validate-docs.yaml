name: Validate Docs & Playbook
on:
  workflow_call: { }
  pull_request:
    branches: [ main, 3.2.x ]
    paths:
      - 'docs/**'
      - 'docs-playbook/**'

jobs:
  validate:
    name: Validate Docs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate Documentation
        run: |
          cd docs-playbook
          ./_build-all.sh
