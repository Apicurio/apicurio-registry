name: Build Jobs

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      node-version:
        type: string
        default: '20'
    outputs:
      image-tag:
        description: 'Docker image tag (commit SHA)'
        value: ${{ jobs.build-java.outputs.image-tag }}

permissions:
  contents: read

jobs:
  build-java:
    name: Build Java Application (no tests)
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Application (skip tests for speed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For downloading Kiota binary.
        run: |
          # -T 0.5C: half a thread per CPU core (overrides .mvn/maven.config's -T 1C for memory-heavy packaging)
          # -Pprod -Dfull: production profile with all optional modules (CLI, serdes, distro, etc.)
          # -DskipCommitIdPlugin=false: generate git commit metadata (needed for the Docker image)
          # -DcliSkipNative: skip GraalVM native-image for CLI (separate verify-cli job handles this)
          # -Daether.syncContext.named.factory=noop: prevent Maven 3.9+ resolver lock deadlocks under -T
          # -Dmaven.wagon.http*: limit concurrent HTTP connections and retry on transient download failures
          ./mvnw clean package -T 0.5C --no-transfer-progress \
            -Pprod -Dfull -DskipTests -DskipCommitIdPlugin=false -DcliSkipNative \
            -Dmaven.source.skip=true -Dmaven.javadoc.skip=true \
            -Daether.syncContext.named.factory=noop \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 \
            -Dmaven.wagon.http.retryHandler.count=5

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "[ERROR] Build produced uncommitted or untracked files. Generated files must either be committed or added to .gitignore as appropriate."
            git --no-pager diff
            git status
            exit 1
          fi

      - name: Build Docker Image
        run: |
          docker build -f ./distro/docker/target/docker/Dockerfile.jvm \
            -t apicurio/apicurio-registry:${{ github.sha }} \
            ./distro/docker/target/docker

      - name: Save Docker Image
        uses: apicurio/apicurio-github-actions/save-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          image-name: apicurio/apicurio-registry
          tag: '${{ github.sha }}'
          output-path: '/tmp/apicurio-registry-${{ github.sha }}.tar'
          artifact-name: 'apicurio-registry-${{ github.sha }}.tar'

      - name: Upload Build Artifacts for Publish
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            app/target/
            distro/docker/target/
            mcp/target/docker/
            java-sdk/common/target/
            java-sdk/adapter-vertx/target/
            java-sdk/adapter-jdk/target/
            java-sdk/client/target/
            java-sdk/client-v2/target/
            config-index/definitions/target/
            common/target/
            schema-util/common/target/
          retention-days: 1

  build-ui:
    name: Build UI Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ui/**/package-lock.json'

      - name: Install Dependencies
        working-directory: ui
        run: npm install

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Package
        working-directory: ui
        run: npm run package

      - name: Install Test Dependencies
        working-directory: ui/tests
        run: npm install

      - name: Lint Tests
        working-directory: ui/tests
        run: npm run lint

      - name: Build UI Docker Image
        working-directory: ui
        run: |
          docker build -t apicurio/apicurio-registry-ui:${{ github.sha }} .

      - name: Save UI Docker Image
        uses: apicurio/apicurio-github-actions/save-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          image-name: apicurio/apicurio-registry-ui
          tag: '${{ github.sha }}'
          output-path: '/tmp/apicurio-registry-ui-${{ github.sha }}.tar'
          artifact-name: 'apicurio-registry-ui-${{ github.sha }}.tar'
