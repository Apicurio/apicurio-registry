name: Verify Console Plugin
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build Console Plugin
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio' && !contains(github.event.*.labels.*.name, 'DO NOT MERGE')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: console-plugin/package.json

      - name: Install frontend dependencies
        working-directory: console-plugin
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: console-plugin
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build backend
        working-directory: console-plugin/backend
        run: ../../mvnw -B clean package -DskipTests -Dcheckstyle.skip
