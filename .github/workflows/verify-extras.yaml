name: Extra Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      node-version:
        type: string
        default: '20'
      image-tag:
        type: string
        required: true
        description: 'Docker image tag to test'

permissions:
  contents: read

jobs:
  extra-tests:
    name: Extra Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: apicurio-registry-${{ inputs.image-tag }}.tar
          image-file: /tmp/apicurio-registry-${{ inputs.image-tag }}.tar
          image-name: apicurio/apicurio-registry
          tag: ${{ inputs.image-tag }}

      - name: Run Extra Tests
        run: |
          # -Pextra-tests: activates the extra-tests profile (additional validation beyond unit/integration)
          # -Dregistry3-image: Docker image to test against (built by the Build job)
          # -Daether.syncContext.named.factory=noop: prevent Maven 3.9+ resolver lock deadlocks under -T
          ./mvnw verify --no-transfer-progress -Dfull -pl utils/extra-tests -am \
            -Pextra-tests \
            -Dregistry3-image=apicurio/apicurio-registry:${{ inputs.image-tag }} \
            -Dmaven.javadoc.skip=true \
            -Daether.syncContext.named.factory=noop

      - name: Run examples/http-caching tests
        working-directory: examples/http-caching/test
        run: |
          ./setup-and-run-tests.sh --registry-image apicurio/apicurio-registry:${{ inputs.image-tag }} --debug

      - name: Collect logs
        if: failure()
        run: sh ./.github/scripts/collect_logs.sh

      - name: Upload tests logs artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tests-logs-extra
          path: artifacts

  integration-tests-ui:
    name: Integration Tests UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ui/tests/package-lock.json'

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-${{ inputs.image-tag }}.tar'
          image-name: 'apicurio/apicurio-registry'
          tag: '${{ inputs.image-tag }}'

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-ui-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-ui-${{ inputs.image-tag }}.tar'
          image-name: 'apicurio/apicurio-registry-ui'
          tag: '${{ inputs.image-tag }}'

      - name: Run UI tests
        run: |
          echo "Starting Registry App (In Memory)"
          docker run -it -p 8080:8080 \
              -e apicurio.rest.deletion.artifact.enabled=true \
              -e apicurio.rest.deletion.group.enabled=true \
              -d apicurio/apicurio-registry:${{ inputs.image-tag }}
          echo "Starting Registry UI"
          docker run -it -p 8888:8080 -d apicurio/apicurio-registry-ui:${{ inputs.image-tag }}

          cd ui/tests
          npm install
          npx playwright install --with-deps

          echo "App System Info:"
          curl -s http://localhost:8080/apis/registry/v3/system/info || true
          echo ""
          echo "Running Playwright tests!"
          npm run test

      - name: Upload Test Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-report
          path: ui/tests/playwright-report/
          retention-days: 30

  integration-tests-legacy-v2:
    name: Integration Tests Legacy V2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Registry 2.6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: 2.6.x

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-${{ inputs.image-tag }}.tar'
          image-name: 'apicurio/apicurio-registry'
          tag: '${{ inputs.image-tag }}'

      - name: Run Legacy Integration Tests (Core API v2)
        run: |
          echo "Starting Registry App (In Memory)"
          docker run -it -p 8181:8080 -e apicurio.rest.deletion.artifact.enabled=true -d apicurio/apicurio-registry:${{ inputs.image-tag }}
          ./mvnw -Pintegration-tests clean install -DskipTests -Dmaven.javadoc.skip=true -DcliSkipNative
          cd integration-tests
          ../mvnw verify -Dmaven.javadoc.skip=true -Dquarkus.http.test-host=localhost -Dquarkus.http.test-port=8181

      - name: Collect logs
        if: failure()
        run: sh ./.github/scripts/collect_logs.sh

      - name: Upload tests logs artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tests-logs-legacy-v2
          path: artifacts

  integration-tests-typescript-sdk:
    name: Integration Tests Typescript SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-${{ inputs.image-tag }}.tar'
          image-name: 'apicurio/apicurio-registry'
          tag: '${{ inputs.image-tag }}'

      - name: Run SDK tests
        run: |
          echo "Starting Registry App (In Memory)"
          docker run -it -p 8080:8080 -e apicurio.rest.deletion.artifact.enabled=true -d apicurio/apicurio-registry:${{ inputs.image-tag }}

          cd typescript-sdk
          npm install
          npm run generate-sources
          npm run test

  build-examples:
    name: Build and Run Application examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts-${{ inputs.image-tag }}
          path: .

      - name: Restore executable permissions
        run: |
          # GitHub Actions artifact upload/download doesn't preserve executable permissions
          # Restore execute permission on protoc binaries
          find . -name "protoc-*" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "*.exe" -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; 2>/dev/null || true

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-${{ inputs.image-tag }}.tar'
          image-name: 'apicurio/apicurio-registry'
          tag: '${{ inputs.image-tag }}'

      - name: Run Apicurio Registry application
        run: |
          docker run -d -p 8080:8080 -it apicurio/apicurio-registry:${{ inputs.image-tag }}

      - name: Build Apicurio Registry with Examples
        run: |
          # -T 1: single-threaded (overrides .mvn/maven.config's -T 1C to prevent module ordering issues with examples)
          # -Pexamples: activates the examples profile (builds example applications)
          # -Dassembly.skipAssembly=true: skip archive generation (not needed for example compilation)
          # -Daether.syncContext.named.factory=noop: prevent Maven 3.9+ resolver lock deadlocks under -T
          mvn install -T 1 -DskipTests -Pexamples -Dassembly.skipAssembly=true -Daether.syncContext.named.factory=noop --no-transfer-progress
