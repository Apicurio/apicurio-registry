name: Integration Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-tag:
        type: string
        required: true
        description: 'Docker image tag to test'

permissions:
  contents: read

jobs:
  integration-tests:
    name: Integration Tests (${{ matrix.storage }}-${{ matrix.name || matrix.groups }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 'groups' selects JUnit 5 test tags via -Dgroups. If omitted, pom.xml default is used.
        # 'name' overrides 'groups' for the job display name when using default groups,
        # groups contains multiple values or contains special characters.
        # For single-group entries, name is derived from groups automatically
        # via ${{ matrix.name || matrix.groups }}.
        include:
          # h2 (in-memory) storage
          - { storage: h2, name: default, remote-profile: remote-mem }
          - { storage: h2, groups: auth, remote-profile: remote-mem }
          - { storage: h2, groups: migration, remote-profile: remote-mem }
          - { storage: h2, name: debezium, groups: 'debezium,debezium-snapshot,debezium-mysql,debezium-mysql-snapshot', remote-profile: remote-mem }
          - { storage: h2, groups: iceberg, remote-profile: remote-mem }
          # postgresql storage
          - { storage: postgresql, name: default, remote-profile: remote-sql }
          - { storage: postgresql, groups: auth, remote-profile: remote-sql }
          - { storage: postgresql, groups: migration, remote-profile: remote-sql }
          # kafkasql storage
          - { storage: kafkasql, name: default, remote-profile: remote-kafka }
          - { storage: kafkasql, groups: auth, remote-profile: remote-kafka }
          - { storage: kafkasql, groups: migration, remote-profile: remote-kafka }
          - { storage: kafkasql, groups: kafkasql-snapshotting, remote-profile: remote-kafka }
          # kubernetesops storage
          - { storage: kubernetesops, groups: kubernetesops, remote-profile: remote-kubernetesops }
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - uses: apicurio/apicurio-github-actions/setup-minikube@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2

      - uses: apicurio/apicurio-github-actions/load-docker-image@97d452c41f1abd7142c0ce2ac37e87922e35e71d # v2
        with:
          artifact-name: 'apicurio-registry-${{ inputs.image-tag }}.tar'
          image-file: '/tmp/apicurio-registry-${{ inputs.image-tag }}.tar'
          minikube: 'true'
          image-name: 'apicurio/apicurio-registry'
          tag: '${{ inputs.image-tag }}'

      - name: Run Integration Tests
        run: |
          # -Pintegration-tests + -P<remote-profile>: select storage backend (remote-mem, remote-sql, remote-kafka, etc.)
          # -Dgroups: JUnit 5 test tags filtering (e.g., auth, migration, debezium)
          # -Dregistry-image: Docker image built by the Build job, loaded into Minikube
          # -Dfailsafe.rerunFailingTestsCount=2: automatically retry flaky integration tests up to 2 times
          # -Daether.syncContext.named.factory=noop: prevent Maven 3.9+ resolver lock deadlocks under -T
          ./mvnw verify -am --no-transfer-progress \
            -Dscalpel.enabled=false \
            -Pintegration-tests \
            -P${{ matrix.remote-profile }} \
            ${{ matrix.groups && format('-Dgroups={0}', matrix.groups) || '' }} \
            -Dregistry-image=apicurio/apicurio-registry:${{ inputs.image-tag }} \
            -pl integration-tests \
            -Dmaven.javadoc.skip=true \
            -Daether.syncContext.named.factory=noop \
            -Dfailsafe.rerunFailingTestsCount=2

      - name: Collect logs
        if: failure()
        run: sh ./.github/scripts/collect_logs.sh

      - name: Upload tests logs artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tests-logs-${{ matrix.storage }}-${{ matrix.name || matrix.groups }}
          path: artifacts
