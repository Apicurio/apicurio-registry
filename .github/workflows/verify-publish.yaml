name: Publish Images

on:
  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true
        description: 'Docker image tag (commit SHA)'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true

jobs:
  publish-app-image:
    name: Publish App Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry'
      dockerfile: './distro/docker/target/docker/Dockerfile.jvm'
      context: './distro/docker/target/docker'
      tag: 'latest-snapshot'
      maven-build: false
      download-artifact: 'build-artifacts-${{ inputs.image-tag }}'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-mcp-image:
    name: Publish MCP Server Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-mcp-server'
      dockerfile: './mcp/target/docker/Dockerfile.jvm'
      context: './mcp/target/docker'
      tag: 'latest-snapshot'
      push-to-dockerhub: false
      maven-build: false
      download-artifact: 'build-artifacts-${{ inputs.image-tag }}'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-ui-image:
    name: Publish UI Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-ui'
      dockerfile: './ui/Dockerfile'
      context: './ui'
      tag: 'latest-snapshot'
      npm-build: true
      npm-build-dir: 'ui'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-support-chat-image:
    name: Publish Support Chat Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-support-chat'
      dockerfile: './support-chat/src/main/docker/Dockerfile.jvm'
      context: './support-chat'
      tag: 'latest-snapshot'
      maven-build: true
      maven-args: 'package -pl support-chat -am -DskipTests -Dcheckstyle.skip=true --no-transfer-progress'
      push-to-dockerhub: false
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
