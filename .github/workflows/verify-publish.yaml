name: Publish Images

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true
        description: 'Docker image tag (commit SHA)'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  publish-app-image:
    name: Publish App Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry'
      dockerfile: './distro/docker/target/docker/Dockerfile.jvm'
      context: './distro/docker/target/docker'
      tag: 'latest-snapshot'
      maven-build: false
      download-artifact: 'build-artifacts-${{ inputs.image-tag }}'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-mcp-image:
    name: Publish MCP Server Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-mcp-server'
      dockerfile: './mcp/target/docker/Dockerfile.jvm'
      context: './mcp/target/docker'
      tag: 'latest-snapshot'
      push-to-dockerhub: false
      maven-build: false
      download-artifact: 'build-artifacts-${{ inputs.image-tag }}'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-ui-image:
    name: Publish UI Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-ui'
      dockerfile: './ui/Dockerfile'
      context: './ui'
      tag: 'latest-snapshot'
      npm-build: true
      npm-build-dir: 'ui'
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-gitops-sync-image:
    name: Publish GitOps Sync Docker Image
    uses: ./.github/workflows/reusable-docker-build.yaml
    with:
      image-name: 'apicurio/apicurio-registry-gitops-sync'
      dockerfile: './distro/gitops/Dockerfile'
      context: './distro/gitops'
      tag: 'latest-snapshot'
      push-to-dockerhub: false
      platforms: 'linux/amd64,linux/arm64'
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  publish-support-chat-image:
    name: Publish Support Chat Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build support-chat module
        working-directory: support-chat
        run: mvn -s ${{ github.workspace }}/.github/ci-settings.xml package -DskipTests --no-transfer-progress

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Quay.io Registry
        run: docker login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build and Push Image
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker buildx build \
              --push \
              --file ./support-chat/src/main/docker/Dockerfile.jvm \
              --platform linux/amd64,linux/arm64 \
              --tag quay.io/apicurio/apicurio-registry-support-chat:latest-snapshot \
              ./support-chat
