name: Unit Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-tag:
        type: string
        required: true
        description: 'Build artifact identifier (commit SHA)'
      scalpel-disabled:
        type: string
        default: 'false'
        description: 'Set to true to disable Scalpel affected-module detection'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: app-rest
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.noprofile.rest.**,io.apicurio.registry.noprofile.ccompat.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: app-sql
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.sql.**,io.apicurio.registry.storage.impl.search.**,io.apicurio.registry.storage.impl.polling.**,io.apicurio.registry.storage.impl.readonly.**,io.apicurio.registry.storage.decorator.**,io.apicurio.registry.storage.dto.**,io.apicurio.registry.event.sql.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: app-kafkasql
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.kafkasql.**,io.apicurio.registry.event.kafkasql.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: app-gitops
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.gitops.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: app-kubernetesops
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.kubernetesops.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: app-other
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=!io.apicurio.registry.noprofile.rest.**,!io.apicurio.registry.noprofile.ccompat.**,!io.apicurio.registry.storage.**,!io.apicurio.registry.event.**"
            maven-opts: "-Xmx4g -Dassembly.skipAssembly=true"
          - name: non-app
            modules: "-Dfull -DcliSkipNative -pl !app,!distro/docker,!docs,!docs/config-generator,!docs/rest-api"
            test-filter: ""
            maven-opts: "-Xmx4g"
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts-${{ inputs.image-tag }}
          path: .

      - name: Restore executable permissions
        run: |
          find . -name "protoc-*" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "*.exe" -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run Unit Tests (${{ matrix.shard.name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_OPTS: ${{ matrix.shard.maven-opts }}
        run: |
          # Each shard compiles the same modules but runs a different subset of tests via -Dtest= filters.
          # Pre-built artifacts from the Build job are downloaded but Maven still needs to resolve/compile.
          # -Dsurefire.failIfNoSpecifiedTests=false: don't fail if a shard's test filter matches zero tests
          # -Dsurefire.rerunFailingTestsCount=2: automatically retry flaky tests up to 2 times
          # -Daether.syncContext.named.factory=noop: prevent Maven 3.9+ resolver lock deadlocks under -T
          ./mvnw verify \
            --no-transfer-progress \
            ${{ inputs.scalpel-disabled == 'true' && '-Dscalpel.enabled=false' || '' }} \
            -Pprod ${{ matrix.shard.modules }} \
            ${{ matrix.shard.test-filter }} \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -DskipCommitIdPlugin=true \
            -Dcheckstyle.skip=true \
            -Dmaven.source.skip=true -Dmaven.javadoc.skip=true \
            -Daether.syncContext.named.factory=noop \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 \
            -Dmaven.wagon.http.retryHandler.count=5 \
            -Dsurefire.rerunFailingTestsCount=2
