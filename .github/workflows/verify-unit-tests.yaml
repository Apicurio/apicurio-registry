name: Unit Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-tag:
        type: string
        required: true
        description: 'Build artifact identifier (commit SHA)'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: app-rest
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.noprofile.rest.**,io.apicurio.registry.noprofile.ccompat.**"
            maven-opts: "-Xmx4g"
          - name: app-sql
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.sql.**,io.apicurio.registry.storage.impl.search.**,io.apicurio.registry.storage.impl.polling.**,io.apicurio.registry.storage.impl.readonly.**,io.apicurio.registry.storage.decorator.**,io.apicurio.registry.storage.dto.**,io.apicurio.registry.event.sql.**"
            maven-opts: "-Xmx4g"
          - name: app-kafkasql
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.kafkasql.**,io.apicurio.registry.event.kafkasql.**"
            maven-opts: "-Xmx4g"
          - name: app-gitops
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.gitops.**"
            maven-opts: "-Xmx4g"
          - name: app-kubernetesops
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=io.apicurio.registry.storage.impl.kubernetesops.**"
            maven-opts: "-Xmx4g"
          - name: app-other
            modules: "-pl app -am -Dfull -DcliSkipNative"
            test-filter: "-Dtest=!io.apicurio.registry.noprofile.rest.**,!io.apicurio.registry.noprofile.ccompat.**,!io.apicurio.registry.storage.**,!io.apicurio.registry.event.**"
            maven-opts: "-Xmx4g"
          - name: non-app
            modules: "-Dfull -DcliSkipNative -pl !app,!distro/docker,!docs,!docs/config-generator,!docs/rest-api"
            test-filter: ""
            maven-opts: "-Xmx4g"
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Build Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-artifacts-${{ inputs.image-tag }}
          path: .

      - name: Restore executable permissions
        run: |
          find . -name "protoc-*" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "*.exe" -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run Unit Tests (${{ matrix.shard.name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_OPTS: ${{ matrix.shard.maven-opts }}
        run: |
          ./mvnw verify \
            --no-transfer-progress \
            -Pprod ${{ matrix.shard.modules }} \
            ${{ matrix.shard.test-filter }} \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -DskipCommitIdPlugin=false \
            -Dmaven.source.skip=true -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.httpconnectionManager.maxTotal=30 \
            -Dmaven.wagon.http.retryHandler.count=5
