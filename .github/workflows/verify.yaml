name: Verify
on:
  push:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - 'README*'
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - 'README*'
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # SCOPE: Determine which test phases to run based on lifecycle labels
  # ============================================================================
  determine-scope:
    name: Determine Test Scope
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apicurio'
    outputs:
      run_smoke: ${{ steps.scope.outputs.run_smoke }}
      run_full: ${{ steps.scope.outputs.run_full }}
    steps:
      - name: Evaluate scope
        id: scope
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          # Push events: always run full
          if [ "$EVENT" = "push" ]; then
            echo "run_smoke=true" >> $GITHUB_OUTPUT
            echo "run_full=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Labeled events: only react to lifecycle label changes
          if [ "$ACTION" = "labeled" ]; then
            LABEL='${{ github.event.label.name }}'
            if [[ "$LABEL" != lifecycle/* ]]; then
              echo "run_smoke=false" >> $GITHUB_OUTPUT
              echo "run_full=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          has_label() { echo "$LABELS" | jq -e "index(\"$1\")" > /dev/null 2>&1; }

          if has_label "orchestrator/enabled"; then
            # Orchestrated PR: scope based on lifecycle state
            if has_label "lifecycle/ready-for-review" || has_label "lifecycle/ready-to-merge"; then
              echo "run_smoke=true" >> $GITHUB_OUTPUT
              echo "run_full=true" >> $GITHUB_OUTPUT
            elif has_label "lifecycle/wip"; then
              if has_label "orchestrator/tests-disabled"; then
                echo "run_smoke=false" >> $GITHUB_OUTPUT
                echo "run_full=false" >> $GITHUB_OUTPUT
              else
                echo "run_smoke=true" >> $GITHUB_OUTPUT
                echo "run_full=false" >> $GITHUB_OUTPUT
              fi
            else
              # lifecycle/new or no lifecycle label: skip tests
              echo "run_smoke=false" >> $GITHUB_OUTPUT
              echo "run_full=false" >> $GITHUB_OUTPUT
            fi
          else
            # Non-orchestrated PR: existing behavior (DO NOT MERGE backward compat)
            if has_label "DO NOT MERGE"; then
              echo "run_smoke=false" >> $GITHUB_OUTPUT
              echo "run_full=false" >> $GITHUB_OUTPUT
            else
              echo "run_smoke=true" >> $GITHUB_OUTPUT
              echo "run_full=true" >> $GITHUB_OUTPUT
            fi
          fi

  # ============================================================================
  # PHASE 1: Fast Checks (fail early)
  # ============================================================================
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-22.04
    needs: determine-scope
    if: needs.determine-scope.outputs.run_smoke == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run linter
        run: ./scripts/validate-files.sh

      - name: Verify docs generation
        run: |
          if [ -n "$(git status --untracked-files=no --porcelain docs)" ]; then
            echo "Docs needs to be regenerated. Run 'mvn clean install -pl docs -am -DskipTests' and commit the resulting files in the 'docs' folder."
            git --no-pager diff docs
            exit 1
          fi

  # ============================================================================
  # PHASE 2: Build (parallel Java + UI builds)
  # ============================================================================
  build:
    name: Build
    needs: [determine-scope, lint-and-validate]
    if: needs.determine-scope.outputs.run_smoke == 'true'
    uses: ./.github/workflows/verify-build.yaml

  # ============================================================================
  # PHASE 3: Unit Tests (parallel with integration tests)
  # ============================================================================
  unit-tests:
    name: Unit Tests
    needs: [determine-scope, build]
    if: needs.determine-scope.outputs.run_smoke == 'true'
    uses: ./.github/workflows/verify-unit-tests.yaml
    with:
      image-tag: ${{ github.sha }}

  # Path filter for conditional CLI verification (native build + tests)
  detect-cli-changes:
    name: Detect CLI Changes
    needs: [determine-scope, build]
    if: needs.determine-scope.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for CLI changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'java-sdk/**'
              - '.github/workflows/verify-cli.yaml'

  cli-verify:
    name: CLI Verification
    needs: detect-cli-changes
    if: needs.detect-cli-changes.outputs.cli == 'true'
    uses: ./.github/workflows/verify-cli.yaml
    with:
      image-tag: ${{ github.sha }}

  # ============================================================================
  # PHASE 4: Integration Tests (matrix-based parallel execution)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    needs: [determine-scope, build]
    if: needs.determine-scope.outputs.run_full == 'true'
    uses: ./.github/workflows/verify-integration-tests.yaml
    with:
      image-tag: ${{ github.sha }}

  # ============================================================================
  # PHASE 5: Additional Tests (parallel)
  # ============================================================================
  extras:
    name: Extra Tests
    needs: [determine-scope, build]
    if: needs.determine-scope.outputs.run_full == 'true'
    uses: ./.github/workflows/verify-extras.yaml
    with:
      image-tag: ${{ github.sha }}

  # ============================================================================
  # PHASE 6: SDK Verification (parallel)
  # ============================================================================
  sdk:
    name: SDK Verification
    needs: [determine-scope, build]
    if: needs.determine-scope.outputs.run_full == 'true'
    uses: ./.github/workflows/verify-sdk.yaml
    with:
      image-tag: ${{ github.sha }}

  # ============================================================================
  # PHASE 7: Publish Images (only on push to main)
  # ============================================================================
  publish:
    name: Publish Images
    needs: [build, unit-tests, integration-tests, extras]
    if: github.event_name == 'push' && github.repository_owner == 'Apicurio'
    uses: ./.github/workflows/verify-publish.yaml
    with:
      image-tag: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  # ============================================================================
  # PHASE 9: Notifications (using reusable workflow)
  # ============================================================================
  notify-slack:
    name: Slack Notification
    needs: [unit-tests, integration-tests, publish]
    if: github.event_name == 'push' && always()
    uses: ./.github/workflows/reusable-notify-slack.yaml
    with:
      workflow-name: ${{ github.workflow }}
      job-name: 'verification'
      job-status: ${{ (needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure' || needs.publish.result == 'failure') && 'failure' || 'success' }}
    secrets:
      SLACK_NOTIFICATION_WEBHOOK: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
      SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
