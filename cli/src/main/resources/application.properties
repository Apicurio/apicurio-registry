# Quarkus CLI Configuration

# Disable banner (we use our own ASCII art in the help header)
quarkus.banner.enabled=false

# Application version (filtered by Maven)
quarkus.application.version=${project.version}

# Alias for backward compatibility with existing code
version=${project.version}

# Logging - send log output to stderr so stdout is clean for CLI output
quarkus.log.console.stderr=true
quarkus.log.level=OFF



# Native image configuration
quarkus.native.additional-build-args=\
  --initialize-at-run-time=io.vertx.ext.auth.impl.jose.JWT

# Embed the Jansi native libraries so terminal width detection works in the native binary
quarkus.native.resources.includes=org/fusesource/jansi/internal/native/**

%test.quarkus.log.level=INFO
%test.quarkus.log.category."io.apicurio.registry.cli".level=DEBUG
