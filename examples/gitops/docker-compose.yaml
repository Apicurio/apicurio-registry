# GitOps Local Volume Example - Docker Compose
#
# Clones the example repository into a Docker volume and runs the registry
# in GitOps mode. No sidecar needed — the registry reads directly from the volume.
#
# Run:
#   cd examples/gitops
#   docker compose up
#
# To run as the staging registry (includes experimental schemas):
#   APICURIO_POLLING_STORAGE_ID=staging docker compose up
#
# Endpoints:
#   - Registry API: http://localhost:8080/apis/registry/v3
#   - Registry UI:  http://localhost:8888

services:

  # Clone the example repository into a Docker volume
  git-init:
    container_name: git-init
    image: alpine/git:latest
    volumes:
      - git-repo:/repos
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -d /repos/default/.git ]; then
          echo "Cloning example GitOps repository..."
          git clone https://github.com/Apicurio/apicurio-registry-gitops-example.git /repos/default
          echo "Example repository initialized."
        else
          echo "Repository already initialized, skipping."
        fi

  # Apicurio Registry (GitOps mode)
  registry:
    container_name: registry-gitops
    image: ${REGISTRY_IMAGE:-quay.io/apicurio/apicurio-registry:latest-snapshot}
    environment:
      QUARKUS_PROFILE: "prod"
      APICURIO_STORAGE_KIND: "gitops"
      APICURIO_FEATURES_EXPERIMENTAL_ENABLED: "true"
      APICURIO_POLLING_STORAGE_ID: "${APICURIO_POLLING_STORAGE_ID:-prod}"
      # Faster startup for the example (lower debounce)
      APICURIO_POLLING_STORAGE_POLL_PERIOD: "PT5S"
      APICURIO_POLLING_STORAGE_DEBOUNCE_QUIET_PERIOD: "PT5S"
      APICURIO_POLLING_STORAGE_DEBOUNCE_MAX_WAIT_PERIOD: "PT30S"
      LOG_LEVEL: "INFO"
      QUARKUS_LOG_CATEGORY__IO_APICURIO__LEVEL: "DEBUG"
      QUARKUS_HTTP_CORS: "true"
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    volumes:
      - git-repo:/repos:ro
    ports:
      - "8080:8080"
    depends_on:
      git-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Apicurio Registry UI
  ui:
    container_name: registry-ui
    image: quay.io/apicurio/apicurio-registry-ui:latest-snapshot
    environment:
      REGISTRY_API_URL: http://localhost:8080/apis/registry/v3
    ports:
      - "8888:8080"
    depends_on:
      registry:
        condition: service_healthy

volumes:
  git-repo:
