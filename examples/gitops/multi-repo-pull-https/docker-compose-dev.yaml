# GitOps Multi-Repo Example - Quarkus Dev Mode
#
# Use this when running the registry locally with `mvn quarkus:dev`.
# The sidecar pulls two branches into local directories; Registry reads from them.
#
# Setup:
#   1. Start the sidecar and UI:
#      cd examples/gitops/multi-repo-pull-https
#      docker compose -f docker-compose-dev.yaml up
#
#   2. Start Registry in dev mode:
#      mvn clean install -Dfast -pl app -am -DskipTests && cd app
#      mvn quarkus:dev \
#        -Dapicurio.storage.kind=gitops \
#        -Dapicurio.features.experimental.enabled=true \
#        -Dapicurio.polling-storage.id=prod \
#        -Dapicurio.gitops.workspace=$(pwd)/../examples/gitops/multi-repo-pull-https/repos \
#        -Dapicurio.gitops.repos.0.dir=platform \
#        -Dapicurio.gitops.repos.1.dir=fulfillment \
#        -Dapicurio.log.level=debug
#
# Endpoints:
#   - Registry API: http://localhost:8080/apis/registry/v3
#   - Registry UI:  http://localhost:8888

services:

  # The sidecar runs as a non-root 'git' user, but bind-mounted directories
  # are owned by root (created by Docker) or the host user. This init container
  # creates the repos directory with world-writable permissions so the sidecar
  # can clone into it. Not needed for Docker volume mounts (full-stack compose).
  setup:
    container_name: setup
    image: alpine:latest
    volumes:
      - .:/work
    command: sh -c 'mkdir -p /work/repos && chmod 777 /work/repos'

  gitops-sync:
    container_name: gitops-sync
    image: ${SIDECAR_IMAGE:-quay.io/apicurio/apicurio-registry-gitops-sync:latest-snapshot}
    environment:
      APICURIO_GITOPS_SECURITY: "dev"
      # Platform team repo (main branch)
      APICURIO_GITOPS_REPOS_0_DIR: "platform"
      APICURIO_GITOPS_REPOS_0_URL: "https://github.com/Apicurio/apicurio-registry-gitops-example.git"
      # Fulfillment team repo (fulfillment branch)
      APICURIO_GITOPS_REPOS_1_DIR: "fulfillment"
      APICURIO_GITOPS_REPOS_1_BRANCH: "fulfillment"
      APICURIO_GITOPS_REPOS_1_URL: "https://github.com/Apicurio/apicurio-registry-gitops-example.git"
    volumes:
      - ./repos:/repos
    depends_on:
      setup:
        condition: service_completed_successfully

  registry-ui:
    container_name: registry-ui
    image: quay.io/apicurio/apicurio-registry-ui:latest-snapshot
    environment:
      REGISTRY_API_URL: http://localhost:8080/apis/registry/v3
    ports:
      - "8888:8080"
