# GitOps Pull Mode (HTTPS) - Quarkus Dev Mode
#
# Use this when running the registry locally with `mvn quarkus:dev`.
# The sidecar pulls from a remote repo into a local directory; Registry reads from it.
#
# Steps:
#
#   1. (Recommended) Fork https://github.com/Apicurio/apicurio-registry-gitops-example
#
#   2. (Recommended) Update APICURIO_GITOPS_REPO_URL below with your fork URL
#
#   3. Start the sidecar and UI:
#      docker compose -f docker-compose-dev.yaml up
#
#   4. Start Registry in dev mode:
#      pushd ../../..
#      mvn clean install -Dfast -pl app -am -DskipTests
#      cd app
#      mvn quarkus:dev \
#        -Dapicurio.storage.kind=gitops \
#        -Dapicurio.features.experimental.enabled=true \
#        -Dapicurio.polling-storage.id=prod \
#        -Dapicurio.gitops.workspace=$(pwd)/../examples/gitops/pull-https/repos \
#        -Dapicurio.log.level=debug
#
# Endpoints:
#   - Registry API: http://localhost:8080/apis/registry/v3
#   - Registry UI:  http://localhost:8888

services:

  # The sidecar runs as a non-root 'git' user, but bind-mounted directories
  # are owned by root (created by Docker) or the host user. This init container
  # creates the repos directory with world-writable permissions so the sidecar
  # can clone into it. Not needed for Docker volume mounts (full-stack compose).
  setup:
    container_name: setup
    image: alpine:latest
    volumes:
      - .:/work
    command: sh -c 'mkdir -p /work/repos && chmod 777 /work/repos'

  gitops-sync:
    container_name: gitops-sync
    image: ${SIDECAR_IMAGE:-quay.io/apicurio/apicurio-registry-gitops-sync:latest-snapshot}
    environment:
      APICURIO_GITOPS_REPO_URL: "${APICURIO_GITOPS_REPO_URL:-https://github.com/Apicurio/apicurio-registry-gitops-example.git}"
      APICURIO_GITOPS_SECURITY: "dev"
    volumes:
      - ./repos:/repos
    depends_on:
      setup:
        condition: service_completed_successfully

  registry-ui:
    container_name: registry-ui
    image: quay.io/apicurio/apicurio-registry-ui:latest-snapshot
    environment:
      REGISTRY_API_URL: http://localhost:8080/apis/registry/v3
    ports:
      - "8888:8080"
