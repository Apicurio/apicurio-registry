# GitOps Pull Mode (SSH) - Quarkus Dev Mode
#
# Use this when running the registry locally with `mvn quarkus:dev`.
# The sidecar pulls from a private repo into a local directory; Registry reads from it.
#
# Setup:
#
#   1. (Recommended) Fork https://github.com/Apicurio/apicurio-registry-gitops-example
#
#   2. Generate an SSH key pair (if you haven't already):
#      cd examples/gitops/pull-ssh
#      ssh-keygen -t ed25519 -f secrets/id_ed25519 -N "" -C "apicurio-registry-gitops-sync"
#
#   3. Add the public key (secrets/id_ed25519.pub) as a deploy key in your Git repository:
#      - GitHub: Settings > Deploy keys > Add deploy key (read-only access is sufficient)
#      - GitLab: Settings > Repository > Deploy keys
#
#   4. (Recommended) Pre-populate known_hosts to avoid TOFU:
#      cd examples/gitops/pull-ssh
#      ssh-keyscan github.com > secrets/known_hosts
#
#   5. Start the sidecar and UI:
#      cd examples/gitops/pull-ssh
#      APICURIO_GITOPS_REPO_URL=git@github.com:your-org/apicurio-registry-gitops-example.git docker compose -f docker-compose-dev.yaml up
#
#   6. Start Registry in dev mode:
#      mvn clean install -Dfast -pl app -am -DskipTests && cd app
#      mvn quarkus:dev \
#        -Dapicurio.storage.kind=gitops \
#        -Dapicurio.features.experimental.enabled=true \
#        -Dapicurio.polling-storage.id=prod \
#        -Dapicurio.gitops.workspace=$(pwd)/../examples/gitops/pull-ssh/repos \
#        -Dapicurio.log.level=debug
#
# Endpoints:
#   - Registry API: http://localhost:8080/apis/registry/v3
#   - Registry UI:  http://localhost:8888

services:

  # The sidecar runs as a non-root 'git' user, but bind-mounted directories
  # are owned by root (created by Docker) or the host user. This init container
  # creates the repos directory with world-writable permissions so the sidecar
  # can clone into it. Not needed for Docker volume mounts (full-stack compose).
  setup:
    container_name: setup
    image: alpine:latest
    volumes:
      - .:/work
    command: sh -c 'mkdir -p /work/repos && chmod 777 /work/repos'

  gitops-sync:
    container_name: gitops-sync
    image: ${SIDECAR_IMAGE:-quay.io/apicurio/apicurio-registry-gitops-sync:latest-snapshot}
    environment:
      APICURIO_GITOPS_REPO_URL: "${APICURIO_GITOPS_REPO_URL:-git@github.com:your-org/apicurio-registry-gitops-example.git}"
      APICURIO_GITOPS_SSH_KEY: "/secrets/id_ed25519"
      # Uncomment the next line after creating secrets/known_hosts:
      # APICURIO_GITOPS_SSH_KNOWN_HOSTS: "/secrets/known_hosts"
      # and then enable strict security mode:
      # APICURIO_GITOPS_SECURITY: "strict"
    volumes:
      - ./repos:/repos
      - ./secrets:/secrets:ro
    depends_on:
      setup:
        condition: service_completed_successfully

  registry-ui:
    container_name: registry-ui
    image: quay.io/apicurio/apicurio-registry-ui:latest-snapshot
    environment:
      REGISTRY_API_URL: http://localhost:8080/apis/registry/v3
    ports:
      - "8888:8080"
