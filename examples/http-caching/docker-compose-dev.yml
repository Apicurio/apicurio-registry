version: '3.8'

services:
  # Varnish Cache pointing to host machine (quarkus:dev on port 8080)
  varnish:
    container_name: varnish-cache-dev
    image: varnish:7.4
    volumes:
      - ./varnish/default-dev.vcl:/etc/varnish/default.vcl:ro
    # Use host network mode to access localhost:8080 directly
    # Varnish will bind to port 6081 on your host machine
    network_mode: host
    environment:
      VARNISH_SIZE: 256M
    # Override the default entrypoint to specify custom port
    entrypoint: []
    command:
      - "sh"
      - "-c"
      - |
        echo "dev-secret" > /tmp/varnish-secret &&
        /usr/sbin/varnishd -F \
          -f /etc/varnish/default.vcl \
          -a http=:6081,HTTP \
          -T localhost:6082 \
          -S /tmp/varnish-secret \
          -s malloc,256M \
          -p default_ttl=3600 \
          -p default_grace=3600
    healthcheck:
      test: ["CMD", "sh", "-c", "varnishadm -T localhost:6082 -S /tmp/varnish-secret ping"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s
