version: '3.8'

volumes:
  postgres_data:
    driver: local

services:
  # PostgreSQL Database
  postgres:
    container_name: postgres-registry-cache
    image: postgres:15
    environment:
      POSTGRES_USER: apicurio-registry
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apicurio-registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicurio-registry"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Apicurio Registry (Backend)
  registry:
    container_name: registry-backend
    image: quay.io/apicurio/apicurio-registry:latest-snapshot
    environment:
      # Database configuration
      APICURIO_DATASOURCE_URL: 'jdbc:postgresql://postgres:5432/apicurio-registry'
      APICURIO_DATASOURCE_USERNAME: apicurio-registry
      APICURIO_DATASOURCE_PASSWORD: password
      APICURIO_STORAGE_KIND: "sql"
      APICURIO_STORAGE_SQL_KIND: "postgresql"

      # Server configuration
      QUARKUS_HTTP_PORT: 8081
      QUARKUS_PROFILE: "prod"

      # Enable anonymous read access for Phase 1 (public caching)
      APICURIO_AUTH_ANONYMOUS_READ_ACCESS_ENABLED: "true"

      # Logging
      LOG_LEVEL: "INFO"
      QUARKUS_LOG_CATEGORY__IO_APICURIO__LEVEL: "DEBUG"

      # CORS (for testing from browser)
      QUARKUS_HTTP_CORS: "true"
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    ports:
      - "8081:8081"  # Direct access to registry (bypass cache)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Varnish Cache (HTTP Proxy Cache)
  varnish:
    container_name: varnish-cache
    image: varnish:7.4
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl:ro
    ports:
      - "8080:80"    # Cached access to registry
      - "6082:6082"  # Varnish admin interface
    environment:
      VARNISH_SIZE: 256M
    entrypoint: []
    command:
      - "sh"
      - "-c"
      - |
        echo "dev-secret" > /tmp/varnish-secret &&
        /usr/sbin/varnishd -F \
          -f /etc/varnish/default.vcl \
          -a http=:80,HTTP \
          -T :6082 \
          -S /tmp/varnish-secret \
          -s malloc,256M \
          -p default_ttl=3600 \
          -p default_grace=3600
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "varnishadm -T :6082 -S /tmp/varnish-secret ping"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

networks:
  default:
    name: registry-cache-network
