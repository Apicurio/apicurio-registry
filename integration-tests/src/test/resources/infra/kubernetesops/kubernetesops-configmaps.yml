apiVersion: v1
kind: ConfigMap
metadata:
  namespace: "apicurio-registry-e2e"
  name: registry-config
  labels:
    apicurio.io/registry-id: "e2e-test"
data:
  registry-test.yaml: |
    $type: registry-v0
    id: e2e-test
    globalRules:
      - type: VALIDITY
        enabled: true
        config: FULL
    settings: [ ]
  group-foo.yaml: |
    $type: group-v0
    registryId: e2e-test
    id: foo
  artifact-petstore.yaml: |
    $type: artifact-v0
    registryId: e2e-test
    groupId: foo
    id: petstore
    versions:
      - id: 1
        globalId: 1
        contentFile: content-1.yaml
    rules:
      - type: COMPATIBILITY
        enabled: true
        config: BACKWARD
  content-1.yaml: |
    $type: content-v0
    registryId: e2e-test
    id: 1
    contentHash: 7dc119919441597e2b24335d8c8f6d01f1f0b895637f79b35e3863a3c2df9ddf
    dataFile: petstore-1.0.0.yaml
  petstore-1.0.0.yaml: |
    openapi: "3.0.0"
    info:
      version: 1.0.0
      title: Swagger Petstore
      license:
        name: MIT
    servers:
      - url: http://petstore.swagger.io/v1
    paths:
      /pets:
        get:
          summary: List all pets
          operationId: listPets
          tags:
            - pets
          parameters:
            - name: limit
              in: query
              description: How many items to return at one time (max 100)
              required: false
              schema:
                type: integer
                maximum: 100
                format: int32
          responses:
            '200':
              description: A paged array of pets
              headers:
                x-next:
                  description: A link to the next page of responses
                  schema:
                    type: string
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Pets"
            default:
              description: unexpected error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"
        post:
          summary: Create a pet
          operationId: createPets
          tags:
            - pets
          responses:
            '201':
              description: Null response
            default:
              description: unexpected error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"
      /pets/{petId}:
        get:
          summary: Info for a specific pet
          operationId: showPetById
          tags:
            - pets
          parameters:
            - name: petId
              in: path
              required: true
              description: The id of the pet to retrieve
              schema:
                type: string
          responses:
            '200':
              description: Expected response to a valid request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Pet"
            default:
              description: unexpected error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"
    components:
      schemas:
        Pet:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            tag:
              type: string
        Pets:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/Pet"
        Error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              format: int32
            message:
              type: string
