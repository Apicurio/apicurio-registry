# TLS passthrough example.
# TLS is NOT terminated at the Ingress/Route; traffic passes through encrypted to the app.
# The app is configured with a TLS keystore so it handles HTTPS directly.
# On OpenShift, the route.openshift.io/termination annotation is set automatically.
# On vanilla Kubernetes with NGINX, you may also need: nginx.ingress.kubernetes.io/ssl-passthrough: "true"
# You must create the keystore, and truststore Secrets before applying this CR.
apiVersion: registry.apicur.io/v1
kind: ApicurioRegistry3
metadata:
  name: simple
spec:
  app:
    env:
    ingress:
      host: simple-app.apps.cluster.example
      tlsTermination: passthrough
      tlsSecretName: my-tls-cert
    tls:
      insecureRequests: disabled
      truststoreSecretRef:
        name: truststore
        key: truststore
      truststorePasswordSecretRef:
        name: truststore
        key: password
      keystoreSecretRef:
        name: keystore
        key: keystore
      keystorePasswordSecretRef:
        name: keystore
        key: password
  ui:
    ingress:
      host: simple-ui.apps.cluster.example
      tlsTermination: edge
      tlsSecretName: my-tls-cert
    env:
      - name: REGISTRY_API_URL
        value: https://simple-app.apps.cluster.example/apis/registry/v3
