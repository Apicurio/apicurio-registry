apiVersion: registry.apicur.io/v1
kind: ApicurioRegistry3
metadata:
  name: example-apicurioregistry-kafkasql-scram
spec:
  app:
    storage:
      type: kafkasql
      kafkasql:
        kafkaAccessSecretName: my-kafka-access
    ingress:
      host: example-kafkasql-scram-app.apps.cluster.example
  ui:
    ingress:
      host: example-kafkasql-scram-ui.apps.cluster.example
